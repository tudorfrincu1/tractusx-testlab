## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
syntax: v2

id: available-notification
namespace: ccm-v0.0.1

metadata:
  name: "Available Notification"
  version: "1.0"
  description: >
    Test CX-0135 AVAILABLE notification: send availability notification to SUT
    and verify SUT subsequently pulls the certificate from TestLab.

setup:
  - id: mock_cert_pull
    uses: mock/api
    name: Expose mock endpoint for SUT certificate pull request
    with:
      method: GET
      path: "/api/v1/companycertificate/available"
      response_status: 200
      response_body: "${{ testdata.certificate_available_response }}"
    returns:
      mock:
        type: class
        class: MockInstance
      base_mock_url:
        type: string
      full_mock_url:
        type: string

  - id: ccm_policy
    uses: precondition/provide
    name: Required CCMAPI Usage Policy
    with:
      value:
        permissions:
          - action: use
            constraints:
              and:
                - left_operand: Membership
                  operator: eq
                  right_operand: "active"
                - left_operand: UsagePurpose
                  operator: isAnyOf
                  right_operand: "cx.ccm.base:1"
                - left_operand: FrameworkAgreement
                  operator: eq
                  right_operand: "DataExchangeGovernance:1.0"
    returns:
      policy:
        type: object
        class: Policy

execution:
  - id: pull_notification_endpoint
    uses: connector/pull_data_filtered
    name: Discover CCMAPI notification endpoint and obtain dataplane credentials
    with:
      connector_service: ${{ infrastructure.engine.connector }}
      counter_party_address: ${{ infrastructure.sut.connector.counter_party_address }}
      counter_party_id: ${{ infrastructure.sut.connector.counter_party_id }}
      policy: ${{ setup.ccm_policy.policy }}
      filters:
        - operand_left: "'http://purl.org/dc/terms/type'.'@id'"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "'http://purl.org/dc/terms/subject'.'@id'"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    returns:
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl
    validate:
      - uses: validate/assert
        with: { input: edr_token, operator: not_null }
      - uses: validate/assert
        with: { input: dataplane_url, operator: not_null }

  - id: gen_avail_message_id
    uses: util/generate_uuid
    name: Generate available notification message ID
    returns:
      generated_id:
        type: string
        class: Uuid

  - id: send_available_notification
    uses: connector/dataplane/http_request
    name: Send certificate available notification to SUT
    with:
      method: POST
      dataplane_url: "${{ steps.pull_notification_endpoint.dataplane_url }}"
      path: "/companycertificate/available"
      edr_token: "${{ steps.pull_notification_endpoint.edr_token }}"
      headers:
        Content-Type: "application/json"
      body: "${{ env.testdata.available_notification_body }}"
    returns:
      status_code:
        type: integer
        class: StatusCode
    validate:
      - uses: validate/assert
        with: { input: status_code, operator: equals, value: 200 }

  - id: wait_sut_pull
    uses: mock/wait/http_request
    name: Wait for SUT to pull the certificate from TestLab
    with:
      mock: ${{ setup.mock_cert_pull.mock }}
      timeout_s: "${{ env.sut_response_timeout }}"
    returns:
      request_method:
        type: string
        class: String
      request_headers:
        type: object
        class: ResponseHeaders
      request_body:
        type: object
        class: ResponseBody
      query_params:
        type: object
        class: String
      elapsed_ms:
        type: integer
        class: String
    validate:
      - uses: validate/assert
        with: { input: request_method, operator: equals, value: "GET" }
