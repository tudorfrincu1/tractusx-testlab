## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
syntax: v2

id: expose-testlab-asset
namespace: ccm-v0.0.1

metadata:
  name: "Expose TestLab Asset"
  version: "1.0"
  description: >
    Tests the PULL scenario of CX-0135: TestLab exposes a certificate asset via its
    own connector, then sends an AVAILABLE notification to the SUT through the dataspace
    protocol (catalog, negotiate, transfer, dataplane). The SUT must then discover
    TestLab's catalog, negotiate, and pull the certificate data.

setup:
  - id: create_testlab_asset
    uses: connector/provider/create_asset
    name: Register a CCMAPI-typed asset in TestLab's connector
    with:
      service: testlab
      name: "TestLab CCMAPI Certificate Data"
      description: "CX-0135 compliant certificate data endpoint hosted by TestLab"
      base_url: "${{ env.testlab_mock_base_url }}/api/v1/companycertificate"
      content_type: "application/json"
      properties:
        dct:type:
          "@id": "https://w3id.org/catenax/taxonomy#CCMAPI"
        dct:subject:
          "@id": "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementApi"
        cx-common:version: "3.0"
    returns:
      asset_id:
        type: string
        class: AssetId
    validate:
      - uses: validate/assert
        with: { input: asset_id, operator: not_null }

  - id: create_testlab_policy
    uses: connector/provider/create_policy
    name: Create a usage policy for the CCMAPI asset in TestLab's connector
    with:
      service: testlab
      permissions:
        - action: "use"
          constraint:
            and:
              - leftOperand: "Membership"
                operator: "eq"
                rightOperand: "active"
              - leftOperand: "FrameworkAgreement"
                operator: "eq"
                rightOperand: "DataExchangeGovernance:1.0"
              - leftOperand: "UsagePurpose"
                operator: "isAnyOf"
                rightOperand: "cx.ccm.base:1"
    returns:
      policy_id:
        type: string
        class: PolicyId
    validate:
      - uses: validate/assert
        with: { input: policy_id, operator: not_null }

  - id: create_testlab_contract_def
    uses: connector/provider/create_contract_definition
    name: Bind the asset to the policy
    with:
      service: testlab
      access_policy_id: "${{ setup.create_testlab_policy.policy_id }}"
      contract_policy_id: "${{ setup.create_testlab_policy.policy_id }}"
      asset_selector:
        - operandLeft: "https://w3id.org/edc/v0.0.1/ns/id"
          operator: "="
          operandRight: "${{ setup.create_testlab_asset.asset_id }}"
    returns:
      contract_def_id:
        type: string
        class: ContractDefId
    validate:
      - uses: validate/assert
        with: { input: contract_def_id, operator: not_null }

  - id: mock_certificate_data
    uses: mock/api
    name: Expose mock data endpoint that serves the full BusinessPartnerCertificate payload
    with:
      method: GET
      path: "/api/v1/companycertificate"
      response_status: 200
      response_body:
        businessPartnerNumber: "${{ env.provider_bpn }}"
        certificateType: "${{ env.certificate_type }}"
        registrationNumber: "CERT-EXPOSE-001"
        enclosedSites:
          - enclosedSiteBpn: "${{ env.location_bpns }}"
        validFrom: "2026-01-01"
        validUntil: "2028-12-31"
        trustLevel: "none"
        document:
          documentID: "testlab-cert-expose-001"
          creationDate: "2026-01-01T00:00:00Z"
          contentType: "application/pdf"
          contentBase64: "iVBORw0KGgoAAAANSUhEUgA="
        validator:
          validatorName: "TUV SUD"
          validatorBpn: "BPNL133631123120"
        type:
          certificateVersion: "2015"
          certificateType: "${{ env.certificate_type }}"
        areaOfApplication: "Quality Management"
        issuer:
          issuerName: "TUV SUD"
          issuerBpn: "BPNL133631123120"
    returns:
      mock:
        type: class
        class: MockInstance
      base_mock_url:
        type: string
      full_mock_url:
        type: string

execution:
  - id: pull_notification_endpoint
    uses: connector/pull_data_filtered
    name: Discover the SUT's CCMAPI notification endpoint and obtain dataplane credentials
    with:
      connector_service: ${{ infrastructure.engine.connector }}
      counter_party_address: ${{ infrastructure.sut.connector.counter_party_address }}
      counter_party_id: ${{ infrastructure.sut.connector.counter_party_id }}
      policy: ${{ env.ccm_usage_policy.policy }}
      filters:
        - operand_left: "'http://purl.org/dc/terms/type'.'@id'"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "'http://purl.org/dc/terms/subject'.'@id'"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    returns:
      catalog:
        type: object
        class: Catalog
      datasets:
        type: object
        class: Datasets
      asset_id:
        type: string
        class: AssetId
      negotiation_id:
        type: string
        class: NegotiationId
      transfer_process_id:
        type: string
        class: TransferId
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl
    validate:
      - uses: validate/assert
        with: { input: datasets, operator: not_null }
      - uses: validate/assert
        with: { input: asset_id, operator: not_null }
      - uses: validate/assert
        with: { input: negotiation_id, operator: not_null }
      - uses: validate/assert
        with: { input: transfer_process_id, operator: not_null }
      - uses: validate/assert
        with: { input: edr_token, operator: not_null }
      - uses: validate/assert
        with: { input: dataplane_url, operator: not_null }

  - id: gen_avail_message_id
    uses: util/generate_uuid
    name: Generate unique message ID for the AVAILABLE notification
    returns:
      generated_id:
        type: string
        class: Uuid

  - id: send_available_notification
    uses: connector/dataplane/http_request
    name: Send the AVAILABLE notification to the SUT via its dataplane
    with:
      method: POST
      dataplane_url: "${{ steps.pull_notification_endpoint.dataplane_url }}"
      path: "/companycertificate/available"
      edr_token: "${{ steps.pull_notification_endpoint.edr_token }}"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:${{ steps.gen_avail_message_id.generated_id }}"
          context: "CompanyCertificateManagement-CCMAPI-Available:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "${{ env.consumer_bpn }}"
          receiverBpn: "${{ env.provider_bpn }}"
          relatedMessageId: "urn:uuid:${{ steps.gen_avail_message_id.generated_id }}"
          version: "3.1.0"
          senderFeedbackUrl: "${{ env.testlab_dsp_url }}"
        content:
          documentId: "testlab-cert-expose-001"
          certificateType: "${{ env.certificate_type }}"
          locationBpns:
            - "${{ env.location_bpns }}"
    returns:
      status_code:
        type: integer
        class: StatusCode
    validate:
      - uses: validate/assert
        with: { input: status_code, operator: equals, value: 200 }

  - id: wait_sut_pull
    uses: mock/wait/http_request
    name: Wait for SUT to pull certificate data from TestLab
    with:
      mock: ${{ setup.mock_certificate_data.mock }}
      timeout_s: "${{ env.sut_response_timeout }}"
    returns:
      request_method:
        type: string
        class: String
    validate:
      - uses: validate/assert
        with: { input: request_method, operator: equals, value: "GET" }
