## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
syntax: v2

id: validate-certificate-payload
namespace: ccm-v0.0.1

metadata:
  name: "Validate Certificate Payload"
  version: "1.0"
  description: >
    Discover certificate Submodel asset in provider catalog via EDC,
    negotiate + pull via EDR, and validate against CX-0135
    BusinessPartnerCertificate semantic model v3.1.0.

execution:
  - id: pull_data_1
    uses: connector/pull_data_filtered
    name: Discover certificate Submodel asset and obtain dataplane credentials
    with:
      connector_service: ${{ infrastructure.engine.connector }}
      counter_party_address: ${{ infrastructure.sut.connector.counter_party_address }}
      counter_party_id: ${{ infrastructure.sut.connector.counter_party_id }}
      policy: ${{ env.ccm_usage_policy.policy }}
      filters:
        - operand_left: "'http://purl.org/dc/terms/type'.'@id'"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#Submodel"
        - operand_left: "'http://purl.org/dc/terms/subject'.'@id'"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificate"
    returns:
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl

  - id: assert_edr_token_1
    uses: validate/assert
    name: EDR token must be obtained
    with:
      input: "${{ steps.pull_data_1.edr_token }}"
      operator: not_null

  - id: assert_dataplane_url_1
    uses: validate/assert
    name: Dataplane URL must be returned
    with:
      input: "${{ steps.pull_data_1.dataplane_url }}"
      operator: not_null

  - id: http_call_1
    uses: connector/dataplane/http_request
    name: Fetch certificate payload via data plane
    with:
      method: GET
      dataplane_url: "${{ steps.pull_data_1.dataplane_url }}"
      path: "/companycertificate/${{ env.document_id }}"
      edr_token: "${{ steps.pull_data_1.edr_token }}"
      headers:
        Accept: "application/json"
    returns:
      status_code:
        type: integer
        class: StatusCode
      response_body:
        type: object
        class: ResponseBody

  - id: assert_status_200
    uses: validate/assert
    name: Response status code must be 200
    with:
      input: "${{ steps.http_call_1.status_code }}"
      operator: equals
      value: 200

  - id: assert_body_not_null
    uses: validate/assert
    name: Response body must not be empty
    with:
      input: "${{ steps.http_call_1.response_body }}"
      operator: not_null

  - id: validate_schema_1
    uses: validate/schema
    name: Validate response against BusinessPartnerCertificate v3.1.0 schema
    with:
      input: "${{ steps.http_call_1.response_body }}"
      schema: "${{ env.schemas.certificate_schema }}"

  - id: assert_certificate_type
    uses: validate/field
    name: Certificate type must match expected value
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "certificateType"
      operator: equals
      value: "${{ env.certificate_type }}"
