## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.8).
## It was reviewed and tested by a human committer.

kind: tck
syntax: v2

id: certificate-management-tck

dataspace:
  ecosystem: Catena-X
  version: saturn

infrastructure:
  engine:
    connector:
      required: true
    dtr:
      required: false
  sut:
    connector:
      required: true
    dtr:
      required: true

metadata:
  name: "Certificate Management TCK"
  version: "v0.0.1"
  description: >
    Validate CCMAPI certificate management workflow per CX-0135 v3.1.0:
    (1) Request certificate from provider
    (2) Validate certificate payload against schema
    (3) Await provider feedback callback
    (4) Send feedback notification and await acknowledgment
    (5) Expose TestLab as provider and verify SUT consumer behavior
  authors:
    - name: Certificate Management Expert Group
  copyright_holders:
    - "2026 Contributors to the Eclipse Foundation"
  license: Apache-2.0
  standards:
    - id: CX-0135
      version: v3.1.0
  tags:
    - CCM
  dataspace_version: saturn

env:
  variables:
    - id: provider_url
      uses: variable/type/string
      with:
        source: input
      returns:
        value:
          type: string
    - id: provider_bpn
      uses: variable/type/string
      with:
        source: input
      returns:
        value:
          type: string
    - id: consumer_bpn
      uses: variable/type/string
      with:
        source: input
      returns:
        value:
          type: string
    - id: certificate_type
      uses: variable/type/string
      with:
        value: iso9001
      returns:
        value:
          type: string
    - id: location_bpns
      uses: variable/type/string
      with:
        source: input
      returns:
        value:
          type: string
    - id: testlab_management_url
      uses: variable/type/string
      with:
        source: input
      returns:
        value:
          type: string
    - id: testlab_dsp_url
      uses: variable/type/string
      with:
        source: input
      returns:
        value:
          type: string
    - id: testlab_mock_base_url
      uses: variable/type/string
      with:
        source: input
      returns:
        value:
          type: string
    - id: sut_response_timeout
      uses: variable/type/integer
      with:
        value: 300
      returns:
        value:
          type: integer
    - id: ccm_usage_policy
      uses: config/connector/policy
      name: Required CCMAPI Usage Policy
      with:
        value:
          permissions:
            - action: use
              constraints:
                and:
                  - left_operand: Membership
                    operator: eq
                    right_operand: "active"
                  - left_operand: UsagePurpose
                    operator: isAnyOf
                    right_operand: "cx.ccm.base:1"
                  - left_operand: FrameworkAgreement
                    operator: eq
                    right_operand: "DataExchangeGovernance:1.0"
      returns:
        policy:
          type: object
          class: Policy
  schemas:
    - id: certificate_schema
      source: business_partner_certificate_schema.json
    - id: bpc_v310_schema
      source: bpc-v3.1.0.json
  testdata:
    - id: available_notification_body
      source: available_notification_body.json
      type: application/json
    - id: certificate_available_response
      source: certificate_available_response.json
      type: application/json
    - id: error_unknown_cert_type_body
      source: error_unknown_cert_type_body.json
      type: application/json
    - id: expose_available_notification_body
      source: expose_available_notification_body.json
      type: application/json
    - id: expose_certificate_data_response
      source: expose_certificate_data_response.json
      type: application/json
    - id: push_certificate_body
      source: push_certificate_body.json
      type: application/json
    - id: request_certificate_body
      source: request_certificate_body.json
      type: application/json
    - id: send_feedback_body
      source: send_feedback_body.json
      type: application/json

tests:
  - id: catalog_policy_validation.yaml
    name: Validate CX-0135 catalog policy constraints
  - id: request_certificate.yaml
    name: Request a certificate via CCMAPI
  - id: certificate_asset_validation.yaml
    name: Validate the exposed certificate asset and its usage policy
  - id: validate_payload.yaml
    name: Validate certificate payload against the schema
  - id: push_certificate.yaml
    name: Push a certificate and verify the feedback callback
  - id: available_notification.yaml
    name: Send an available notification and verify acknowledgment
  - id: send_feedback.yaml
    name: Send feedback notification and await acknowledgment
  - id: expose_testlab_asset.yaml
    name: Expose TestLab as provider and verify SUT consumer behavior
  - id: error_handling.yaml
    name: Verify error handling for unknown certificate types
