# Quick Start: Simple ISO 9001 Certificate Request
# Minimal example - just request and validate
#
# This is what a user sees when they pick the "Request ISO 9001 Certificate" template
# Most fields are pre-filled; user only needs to specify provider and location BPNs

api_version: testlab/v1

test_case:
  name: Quick_ISO9001_Check
  version: "1.0.0"
  description: Simple ISO 9001 certificate request and validation
  standard: CX-0135

  setup:
    - name: init
      type: function
      action: print("Ready")

  steps:
    - name: request_cert
      type: request_certificate
      inputs:
        provider_connector_address: @test_root.providers.iso_certifier.edc_dsp_url
        provider_bpn: @test_root.providers.iso_certifier.bpnl
        consumer_bpn: @test_root.consumer_bpnl
        certificate_type: iso9001
        location_bpns:
          - @test_root.consumer_location_bpns[0]
      outputs:
        - request_id
        - request_status
        - document_id

    - name: check_cert
      type: validate_certificate_payload
      prerequisites:
        - request_cert.request_status == COMPLETED
      inputs:
        certificate_data: @request_cert.document_id
      outputs:
        - validation_status

  assertions:
    - assert: @check_cert.validation_status == VALID
      severity: ERROR

