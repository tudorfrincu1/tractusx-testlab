<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TestLab IDE — API Path Block</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #11111b; color: #cdd6f4;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px;
  }

  .modal { background: rgba(0,0,0,0.55); border-radius: 14px; padding: 24px; width: 100%; max-width: 580px; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .modal-title .icon { font-size: 18px; }
  .path-result {
    background: #181825; border: 1px solid #313244; border-radius: 8px;
    padding: 10px 14px; margin-bottom: 14px; min-height: 40px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 14px;
    display: flex; align-items: center; gap: 2px; flex-wrap: wrap;
  }
  .path-sep { color: #585b70; } .path-literal { color: #89b4fa; } .path-variable { color: #a6e3a1; }
  .template-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .template-row label { font-size: 12px; color: #6c7086; flex-shrink: 0; }
  .template-select {
    flex: 1; background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a; border-radius: 6px;
    padding: 6px 10px; font-size: 12px; font-family: 'JetBrains Mono', monospace; cursor: pointer; outline: none;
  }
  .template-select:focus { border-color: #89b4fa; }

  .seg-list { display: flex; flex-direction: column; gap: 5px; max-height: 300px; overflow-y: auto; margin-bottom: 12px; padding-right: 2px; }
  .seg-list::-webkit-scrollbar { width: 4px; }
  .seg-list::-webkit-scrollbar-thumb { background: #45475a; border-radius: 4px; }
  .seg-row { display: flex; align-items: center; gap: 6px; background: #1e1e2e; border: 1px solid #313244; border-radius: 6px; padding: 6px 8px; animation: fadeIn 0.15s ease; }
  .seg-row:hover { border-color: #45475a; }
  .seg-slash { font-family: 'JetBrains Mono', monospace; font-size: 15px; color: #585b70; flex-shrink: 0; }
  .seg-input { flex: 1; background: #181825; color: #cdd6f4; border: 1px solid #45475a; border-left: 3px solid #89b4fa; border-radius: 4px; padding: 5px 8px; font-size: 13px; font-family: 'JetBrains Mono', monospace; outline: none; }
  .seg-input:focus { border-color: #89b4fa; }

  .seg-var-wrap { flex: 1; position: relative; }
  .seg-var-btn { width: 100%; background: #181825; color: #a6e3a1; border: 1px solid #45475a; border-left: 3px solid #a6e3a1; border-radius: 4px; padding: 5px 8px; font-size: 13px; font-family: 'JetBrains Mono', monospace; cursor: pointer; text-align: left; appearance: none; }
  .seg-var-wrap::after { content: '▾'; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #6c7086; pointer-events: none; font-size: 11px; }
  .var-dd { position: absolute; top: 100%; left: 0; right: 0; z-index: 100; background: #1e1e2e; border: 1px solid #45475a; border-radius: 6px; margin-top: 3px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); display: none; max-height: 160px; overflow: hidden; flex-direction: column; }
  .var-dd.open { display: flex; }
  .var-dd-search { background: #181825; border: none; border-bottom: 1px solid #313244; color: #cdd6f4; padding: 6px 8px; font-size: 12px; font-family: 'JetBrains Mono', monospace; outline: none; }
  .var-dd-list { overflow-y: auto; flex: 1; }
  .var-dd-item { padding: 5px 10px; font-size: 12px; color: #a6e3a1; cursor: pointer; font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 5px; }
  .var-dd-item:hover { background: #313244; }
  .var-dd-item .at { color: #6c7086; } .var-dd-item .src { margin-left: auto; font-size: 10px; color: #585b70; }

  .seg-toggle { display: flex; border-radius: 4px; overflow: hidden; border: 1px solid #45475a; flex-shrink: 0; }
  .seg-toggle button { background: #181825; color: #6c7086; border: none; padding: 4px 10px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: 'JetBrains Mono', monospace; transition: background 0.15s, color 0.15s; }
  .seg-toggle button:first-child { border-right: 1px solid #45475a; }
  .seg-toggle button.on-literal { background: #89b4fa; color: #1e1e2e; }
  .seg-toggle button.on-variable { background: #a6e3a1; color: #1e1e2e; }
  .seg-del { background: none; border: none; color: #585b70; font-size: 15px; cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
  .seg-del:hover { color: #f38ba8; background: rgba(243,139,168,0.1); }
  .add-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .add-btn { background: #181825; border: 1px dashed #45475a; border-radius: 6px; padding: 6px 12px; font-size: 12px; color: #a6adc8; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: border-color 0.15s, color 0.15s; }
  .add-btn:hover { border-color: #585b70; color: #cdd6f4; }
  .add-btn .badge-lit { color: #89b4fa; font-weight: 600; } .add-btn .badge-var { color: #a6e3a1; font-weight: 600; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid #313244; padding-top: 14px; margin-top: 4px; }
  .btn { border: none; border-radius: 6px; padding: 7px 18px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .btn-cancel { background: #313244; color: #a6adc8; } .btn-cancel:hover { background: #45475a; }
  .btn-apply { background: #89b4fa; color: #1e1e2e; } .btn-apply:hover { background: #74c7ec; }
  .legend { display: flex; gap: 16px; margin-top: 20px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6c7086; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-dot.lit { background: #89b4fa; } .legend-dot.var { background: #a6e3a1; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="modal">
  <div class="modal-title"><span class="icon">🔗</span> Edit API Path</div>

  <!-- Live result -->
  <div class="path-result" id="pathResult"></div>

  <!-- Template -->
  <div class="template-row">
    <label>Template</label>
    <select class="template-select" id="tplSelect">
      <option value="">— choose —</option>
      <option value="transferprocesses">/api/v1/transferprocesses</option>
      <option value="assets-contracts">/api/v1/assets/@asset_id/contracts</option>
      <option value="catalog">/api/v1/catalog/request</option>
      <option value="edrs">/api/v1/edrs/@transfer_id</option>
    </select>
  </div>

  <!-- Segments -->
  <div class="seg-list" id="segList"></div>

  <!-- Add -->
  <div class="add-row">
    <button class="add-btn" onclick="addSeg('literal')">
      + Add <span class="badge-lit">abc</span> segment
    </button>
    <button class="add-btn" onclick="addSeg('variable')">
      + Add <span class="badge-var">@</span> variable
    </button>
  </div>

  <!-- Footer -->
  <div class="modal-footer">
    <button class="btn btn-cancel">Cancel</button>
    <button class="btn btn-apply">Apply Path</button>
  </div>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><span class="legend-dot lit"></span> Literal (abc)</div>
  <div class="legend-item"><span class="legend-dot var"></span> Variable (@)</div>
</div>

<script>
  const VARS = [
    { name: 'asset_id',     src: 'Create Asset' },
    { name: 'policy_id',    src: 'Create Policy' },
    { name: 'contract_id',  src: 'Negotiate Contract' },
    { name: 'request_id',   src: 'Catalog Request' },
    { name: 'transfer_id',  src: 'Init Transfer' },
    { name: 'endpoint_url', src: 'Get EDR' },
  ];

  const TEMPLATES = {
    'transferprocesses': [
      { t: 'literal', v: 'api' }, { t: 'literal', v: 'v1' }, { t: 'literal', v: 'transferprocesses' },
    ],
    'assets-contracts': [
      { t: 'literal', v: 'api' }, { t: 'literal', v: 'v1' }, { t: 'literal', v: 'assets' },
      { t: 'variable', v: 'asset_id' }, { t: 'literal', v: 'contracts' },
    ],
    'catalog': [
      { t: 'literal', v: 'api' }, { t: 'literal', v: 'v1' }, { t: 'literal', v: 'catalog' },
      { t: 'literal', v: 'request' },
    ],
    'edrs': [
      { t: 'literal', v: 'api' }, { t: 'literal', v: 'v1' }, { t: 'literal', v: 'edrs' },
      { t: 'variable', v: 'transfer_id' },
    ],
  };

  let segs = [
    { t: 'literal', v: 'api' }, { t: 'literal', v: 'v1' }, { t: 'literal', v: 'assets' },
    { t: 'variable', v: 'asset_id' }, { t: 'literal', v: 'contracts' },
  ];
  let openDD = -1;

  document.getElementById('tplSelect').addEventListener('change', function () {
    var tpl = TEMPLATES[this.value];
    if (!tpl) return;
    segs = tpl.map(function (s) { return { t: s.t, v: s.v }; });
    this.value = '';
    render();
  });

  function addSeg(type) {
    segs.push({ t: type, v: type === 'variable' ? VARS[0].name : '' });
    render();
  }
  function removeSeg(i) { segs.splice(i, 1); render(); }

  function setType(i, type) {
    if (segs[i].t === type) return;
    segs[i].t = type;
    segs[i].v = type === 'variable' ? VARS[0].name : '';
    openDD = -1;
    render();
  }
  function setVal(i, val) { segs[i].v = val; renderPath(); }
  function pickVar(i, name) { segs[i].v = name; openDD = -1; render(); }
  function toggleDD(i) { openDD = openDD === i ? -1 : i; render(); }

  function render() { renderRows(); renderPath(); }

  function renderRows() {
    var el = document.getElementById('segList');
    el.innerHTML = '';
    segs.forEach(function (seg, i) {
      var row = document.createElement('div');
      row.className = 'seg-row';

      var slash = document.createElement('span');
      slash.className = 'seg-slash';
      slash.textContent = '/';

      var input;
      if (seg.t === 'variable') {
        input = buildVarPicker(i, seg.v);
      } else {
        input = document.createElement('input');
        input.className = 'seg-input';
        input.type = 'text';
        input.value = seg.v;
        input.placeholder = 'segment';
        (function (idx) {
          input.addEventListener('input', function (e) { setVal(idx, e.target.value); });
        })(i);
      }

      var toggle = document.createElement('div');
      toggle.className = 'seg-toggle';
      var btnLit = document.createElement('button');
      btnLit.textContent = 'abc';
      btnLit.className = seg.t === 'literal' ? 'on-literal' : '';
      (function (idx) { btnLit.addEventListener('click', function () { setType(idx, 'literal'); }); })(i);
      var btnVar = document.createElement('button');
      btnVar.textContent = '@';
      btnVar.className = seg.t === 'variable' ? 'on-variable' : '';
      (function (idx) { btnVar.addEventListener('click', function () { setType(idx, 'variable'); }); })(i);
      toggle.append(btnLit, btnVar);

      var del = document.createElement('button');
      del.className = 'seg-del';
      del.textContent = '\u00d7';
      del.title = 'Remove';
      (function (idx) { del.addEventListener('click', function () { removeSeg(idx); }); })(i);

      row.append(slash, input, toggle, del);
      el.appendChild(row);
    });
  }

  function buildVarPicker(idx, cur) {
    var wrap = document.createElement('div');
    wrap.className = 'seg-var-wrap';

    var btn = document.createElement('button');
    btn.className = 'seg-var-btn';
    btn.textContent = '@ ' + cur;
    (function (i) {
      btn.addEventListener('click', function (e) { e.stopPropagation(); toggleDD(i); });
    })(idx);

    var dd = document.createElement('div');
    dd.className = 'var-dd' + (openDD === idx ? ' open' : '');

    var search = document.createElement('input');
    search.className = 'var-dd-search';
    search.type = 'text';
    search.placeholder = 'Search…';
    search.addEventListener('click', function (e) { e.stopPropagation(); });
    search.addEventListener('input', function (e) {
      var q = e.target.value.toLowerCase();
      dd.querySelectorAll('.var-dd-item').forEach(function (el) {
        el.style.display = el.dataset.n.includes(q) ? '' : 'none';
      });
    });

    var list = document.createElement('div');
    list.className = 'var-dd-list';
    VARS.forEach(function (v) {
      var item = document.createElement('div');
      item.className = 'var-dd-item';
      item.dataset.n = v.name;
      item.innerHTML = '<span class="at">@</span> ' + v.name + '<span class="src">' + v.src + '</span>';
      (function (i, n) {
        item.addEventListener('click', function (e) { e.stopPropagation(); pickVar(i, n); });
      })(idx, v.name);
      list.appendChild(item);
    });

    dd.append(search, list);
    wrap.append(btn, dd);
    if (openDD === idx) requestAnimationFrame(function () { search.focus(); });
    return wrap;
  }

  function renderPath() {
    var el = document.getElementById('pathResult');
    el.innerHTML = '';
    segs.forEach(function (seg) {
      var sep = document.createElement('span');
      sep.className = 'path-sep';
      sep.textContent = '/';
      el.appendChild(sep);

      var span = document.createElement('span');
      span.className = seg.t === 'variable' ? 'path-variable' : 'path-literal';
      span.textContent = seg.t === 'variable' ? '@' + seg.v : seg.v;
      el.appendChild(span);
    });
  }

  document.addEventListener('click', function () {
    if (openDD !== -1) { openDD = -1; render(); }
  });

  render();
</script>
</body>
</html>
