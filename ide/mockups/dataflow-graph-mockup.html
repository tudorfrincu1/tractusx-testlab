<div class="header">

<script>
/* ─── Data ─── */
const STAGES = [
  {
    id: 'request_certificate', label: 'Request Certificate', services: ['provider_edc'],
    outputs: ['catalog','datasets','ccmapi_asset_id','ccmapi_offer_id','contract_agreement_id','data_address','edr_token','request_id','request_status','document_id'],
    steps: [
      { label: 'Get catalog from provider', result: 'passed' },
      { label: 'Find CCMAPI dataset', result: 'passed' },
      { label: 'Negotiate contract', result: 'passed' },
      { label: 'Wait for agreement', result: 'passed' },
      { label: 'Request transfer', result: 'passed' },
      { label: 'Extract EDR token', result: 'passed' },
    ],
  },
  {
    id: 'validate_payload', label: 'Validate Payload', services: [],
    outputs: ['bpc_schema','status_code','response_body','response_headers','value'],
    steps: [
      { label: 'Fetch response body', result: 'passed' },
      { label: 'Parse BPC schema', result: 'passed' },
      { label: 'Validate against schema', result: 'passed' },
    ],
  },
  {
    id: 'await_feedback_callback', label: 'Await Feedback Callback', services: [],
    outputs: ['callback_method','callback_path','callback_payload','callback_request_id','callback_feedback_status','callback_feedback_message'],
    steps: [
      { label: 'Start mock server', result: 'passed' },
      { label: 'Register callback endpoint', result: 'passed' },
      { label: 'Wait for callback', result: 'passed' },
      { label: 'Parse callback payload', result: 'passed' },
      { label: 'Validate feedback status', result: 'passed' },
    ],
  },
  {
    id: 'send_feedback', label: 'Send Feedback', services: ['provider_edc'],
    outputs: ['notification_catalog','notification_datasets','notification_asset_id','notification_offer_id','notification_agreement_id','notification_dataplane_url','notification_edr_token','notification_id','ack_payload','notification_ack_status'],
    steps: [
      { label: 'Get notification catalog', result: 'passed' },
      { label: 'Find notification dataset', result: 'passed' },
      { label: 'Negotiate notification contract', result: 'failed',
        error: {
          type: 'Assertion Failed',
          assertion: 'HTTP response status code check',
          expected: 'status_code == 200',
          received: 'status_code == 403',
        },
        recommendations: [
          { severity: 'critical', icon: '🔴', text: 'Check provider_edc policy permissions for notification asset' },
          { severity: 'warning', icon: '⚠️', text: 'Verify BPN is registered in the provider\'s access policy' },
          { severity: 'info', icon: '💡', text: 'See: <a href="/docs/troubleshooting/contract-negotiation-failures">Troubleshooting → Contract Negotiation Failures</a>' },
        ],
      },
      { label: 'Wait for agreement', result: 'skipped' },
      { label: 'Request transfer', result: 'skipped' },
      { label: 'Get dataplane URL', result: 'skipped' },
      { label: 'Extract EDR token', result: 'skipped' },
      { label: 'Send notification', result: 'skipped' },
      { label: 'Wait for acknowledgment', result: 'skipped' },
      { label: 'Validate ack status', result: 'skipped' },
    ],
  },
  {
    id: 'expose_testlab_asset', label: 'Expose TestLab Asset', services: ['testlab_edc'],
    outputs: ['testlab_asset_id','testlab_policy_id','testlab_contract_def_id','sut_request_body'],
    steps: [
      { label: 'Create testlab asset', result: 'skipped' },
      { label: 'Create policy', result: 'skipped' },
      { label: 'Create contract definition', result: 'skipped' },
      { label: 'Wait for SUT request', result: 'skipped' },
      { label: 'Validate SUT request body', result: 'skipped' },
    ],
    blockedBy: 'send_feedback',
  },
];

/* Zig-zag layout config: rows of stage indices + direction */
const ZIGZAG_ROWS = [
  { indices: [0, 1], dir: 'ltr' },
  { indices: [2, 3], dir: 'rtl' },
  { indices: [4],    dir: 'ltr' },
];

let simRunning = false;
let errorPanelOpen = false;

/* ─── Build zig-zag HTML ─── */
function buildPipeline() {
  const el = document.getElementById('canvas');
  let html = '<div class="zigzag" id="zigzag">';

  ZIGZAG_ROWS.forEach((row, ri) => {
    const isRtl = row.dir === 'rtl';
    html += '<div class="zigzag-row' + (isRtl ? ' rtl' : '') + '" data-row="' + ri + '">';
    row.indices.forEach((si, posInRow) => {
      if (posInRow > 0) html += '<div class="h-edge" data-hedge="' + si + '"></div>';
      html += buildPillNode(STAGES[si], si);
    });
    html += '</div>';
    if (ri < ZIGZAG_ROWS.length - 1) html += '<div class="v-turn" data-vturn="' + ri + '"></div>';
  });

  html += '<svg class="edge-svg" id="edgeSvg"></svg>';
  html += '</div>';
  el.innerHTML = html;

  requestAnimationFrame(() => drawEdges());
}

function buildPillNode(stage, index) {
  const total = stage.steps.length;
  const stepsHTML = stage.steps.map((s, si) => buildStepRow(s, si, total)).join('');
  const outputsHTML = stage.outputs.map(o => '<span class="output-tag">@' + o + '</span>').join('');
  const blockedHTML = stage.blockedBy
    ? '<div class="blocked-banner"><span class="block-icon">⊘</span> Blocked by: <strong>' + stage.blockedBy + '</strong> failure</div>'
    : '';

  return '<div class="pill-node status-idle" data-stage="' + stage.id + '" id="stage-' + stage.id + '">'
    + '<div class="pill-header" onclick="toggleStage(this.parentNode)">'
    + '<div class="pill-icon idle" data-icon="' + stage.id + '">' + (index + 1) + '</div>'
    + '<div class="pill-info">'
    + '<div class="pill-title">' + stage.label + '</div>'
    + '<div class="pill-meta">' + total + ' steps' + (stage.services.length ? ' · ' + stage.services.join(', ') : '') + '</div>'
    + '</div>'
    + '<div class="pill-progress" data-progress-text="' + stage.id + '">0/' + total + '</div>'
    + '<div class="pill-chevron">▶</div>'
    + '</div>'
    + '<div class="detail-panel"><div class="detail-inner">'
    + '<div class="stage-progress-bar"><div class="stage-progress-fill" data-progress="' + stage.id + '"></div></div>'
    + '<div class="steps-list">' + stepsHTML + '</div>'
    + (stage.outputs.length ? '<div class="outputs-section"><div class="outputs-label">Outputs:</div>' + outputsHTML + '</div>' : '')
    + blockedHTML
    + '</div></div></div>';
}

function buildStepRow(step) {
  const errorHTML = step.error ? buildErrorBox(step.error, step.recommendations || []) : '';
  return '<div class="step-row">'
    + '<div class="step-dot-wrap"><div class="step-dot idle" data-step-dot></div></div>'
    + '<div class="step-content">'
    + '<div class="step-label" data-step-label>' + step.label + '</div>'
    + errorHTML
    + '</div></div>';
}

function buildErrorBox(error, recommendations) {
  let recHTML = '';
  if (recommendations.length > 0) {
    const items = recommendations.map(r =>
      '<li class="rec-item">'
      + '<span class="rec-severity">' + r.icon + '</span>'
      + '<span class="rec-text">' + r.text
      + '<span class="rec-severity-label ' + r.severity + '">' + r.severity + '</span>'
      + '</span></li>'
    ).join('');

    recHTML = '<div class="recommendations" data-rec-box style="display:none">'
      + '<div class="rec-header">'
      + '<span class="rec-title">💡 Recommendations</span>'
      + '<span class="rec-config" title="Configurable in block settings">⚙ Configurable in block settings</span>'
      + '</div>'
      + '<ul class="rec-list">' + items + '</ul>'
      + '</div>';
  }

  return '<div class="step-error-box" style="display:none" data-error-box>'
    + '<div class="error-type"><span class="icon">⚠</span> ' + error.type + '</div>'
    + '<div class="error-detail">'
    + '<div><span class="label">Assertion: </span><span class="value">' + error.assertion + '</span></div>'
    + '<div><span class="label">Expected: </span><span class="value good">' + error.expected + '</span></div>'
    + '<div><span class="label">Received: </span><span class="value bad">' + error.received + '</span></div>'
    + '</div>'
    + recHTML
    + '</div>';
}

/* ─── SVG edge drawing ─── */
function drawEdges() {
  const svg = document.getElementById('edgeSvg');
  if (!svg) return;
  const container = document.getElementById('zigzag');
  const rect = container.getBoundingClientRect();

  let paths = '';
  let edgeIndex = 0;

  for (let ri = 0; ri < ZIGZAG_ROWS.length; ri++) {
    const row = ZIGZAG_ROWS[ri];
    /* Horizontal edges within row */
    for (let i = 0; i < row.indices.length - 1; i++) {
      const fromId = STAGES[row.indices[i]].id;
      const toId = STAGES[row.indices[i + 1]].id;
      const fromEl = document.getElementById('stage-' + fromId).querySelector('.pill-header');
      const toEl = document.getElementById('stage-' + toId).querySelector('.pill-header');
      const fromR = fromEl.getBoundingClientRect();
      const toR = toEl.getBoundingClientRect();

      let x1, y1, x2, y2;
      if (row.dir === 'ltr') {
        x1 = fromR.right - rect.left; y1 = fromR.top + fromR.height / 2 - rect.top;
        x2 = toR.left - rect.left;    y2 = toR.top + toR.height / 2 - rect.top;
      } else {
        x1 = fromR.left - rect.left;  y1 = fromR.top + fromR.height / 2 - rect.top;
        x2 = toR.right - rect.left;   y2 = toR.top + toR.height / 2 - rect.top;
      }

      const mid = (x1 + x2) / 2;
      const arrowDir = row.dir === 'ltr' ? 1 : -1;
      const ax = x2 - arrowDir * 6;
      paths += '<path class="edge-path" data-edge="' + edgeIndex + '" d="M' + x1 + ',' + y1 + ' C' + mid + ',' + y1 + ' ' + mid + ',' + y2 + ' ' + x2 + ',' + y2 + '"/>';
      paths += '<polygon class="edge-arrow" data-edge-arrow="' + edgeIndex + '" points="' + x2 + ',' + y2 + ' ' + ax + ',' + (y2 - 4) + ' ' + ax + ',' + (y2 + 4) + '"/>';
      paths += '<circle class="edge-dot-anim" data-edge-dot="' + edgeIndex + '" cx="' + x1 + '" cy="' + y1 + '" r="4"/>';
      edgeIndex++;
    }

    /* Vertical turn edge to next row */
    if (ri < ZIGZAG_ROWS.length - 1) {
      const nextRow = ZIGZAG_ROWS[ri + 1];
      const lastInRow = row.dir === 'ltr' ? row.indices[row.indices.length - 1] : row.indices[0];
      const firstInNext = nextRow.dir === 'ltr' ? nextRow.indices[0] : nextRow.indices[nextRow.indices.length - 1];
      const fromEl = document.getElementById('stage-' + STAGES[lastInRow].id).querySelector('.pill-header');
      const toEl = document.getElementById('stage-' + STAGES[firstInNext].id).querySelector('.pill-header');
      const fromR = fromEl.getBoundingClientRect();
      const toR = toEl.getBoundingClientRect();

      const x1 = fromR.left + fromR.width / 2 - rect.left;
      const y1 = fromR.bottom - rect.top;
      const x2 = toR.left + toR.width / 2 - rect.left;
      const y2 = toR.top - rect.top;
      const midY = (y1 + y2) / 2;

      paths += '<path class="edge-path" data-edge="' + edgeIndex + '" d="M' + x1 + ',' + y1 + ' C' + x1 + ',' + midY + ' ' + x2 + ',' + midY + ' ' + x2 + ',' + y2 + '"/>';
      paths += '<polygon class="edge-arrow" data-edge-arrow="' + edgeIndex + '" points="' + x2 + ',' + y2 + ' ' + (x2 - 4) + ',' + (y2 - 6) + ' ' + (x2 + 4) + ',' + (y2 - 6) + '"/>';
      paths += '<circle class="edge-dot-anim" data-edge-dot="' + edgeIndex + '" cx="' + x1 + '" cy="' + y1 + '" r="4"/>';
      edgeIndex++;
    }
  }

  svg.innerHTML = paths;
  svg.style.width = container.scrollWidth + 'px';
  svg.style.height = container.scrollHeight + 'px';
}

/* Redraw on resize */
window.addEventListener('resize', () => { if (!simRunning) drawEdges(); });

/* ─── Expand/collapse ─── */
function toggleStage(el) {
  el.classList.toggle('expanded');
  requestAnimationFrame(() => drawEdges());
}

/* ─── Error panel ─── */
function toggleErrorPanel() {
  errorPanelOpen = !errorPanelOpen;
  document.getElementById('errorPanel').classList.toggle('collapsed', !errorPanelOpen);
}

function updateErrorPanel(errors) {
  const count = errors.length;
  document.getElementById('errorCount').textContent = count;
  document.getElementById('errorToggleLabel').textContent = count + ' error' + (count !== 1 ? 's' : '');
  document.getElementById('errorToggleBtn').classList.toggle('visible', count > 0);

  const body = document.getElementById('errorPanelBody');
  if (count === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px 16px;font-size:12px">No errors detected</div>';
    return;
  }
  body.innerHTML = errors.map(e => {
    const recsHTML = (e.recommendations || []).length > 0
      ? '<div class="error-card-recs"><strong>💡 ' + e.recommendations.length + ' recommendation(s)</strong></div>'
      : '';
    return '<div class="error-card" onclick="jumpToError(\'' + e.stageId + '\')">'
      + '<div class="error-card-stage"><span style="color:var(--failed)">✗</span> ' + e.stageLabel + '</div>'
      + '<div class="error-card-step">Step ' + (e.stepIndex + 1) + ': ' + e.stepLabel + '</div>'
      + '<div class="error-card-type">⚠ ' + e.error.type + '</div>'
      + '<div class="error-card-detail">Expected: ' + e.error.expected + '<br>Received: ' + e.error.received + '</div>'
      + recsHTML
      + '<div class="error-card-jump">→ Jump to step</div></div>';
  }).join('');
}

function jumpToError(stageId) {
  const node = document.getElementById('stage-' + stageId);
  if (!node) return;
  if (!node.classList.contains('expanded')) { node.classList.add('expanded'); requestAnimationFrame(() => drawEdges()); }
  node.scrollIntoView({ behavior: 'smooth', block: 'center' });
  node.classList.add('highlight-error');
  setTimeout(() => node.classList.remove('highlight-error'), 800);
}

/* ─── Summary bar ─── */
function updateSummary(passed, failed, skipped) {
  document.getElementById('sumPassed').textContent = passed;
  document.getElementById('sumFailed').textContent = failed;
  document.getElementById('sumSkipped').textContent = skipped;
}

/* ─── Stage status helpers ─── */
function setStageStatus(stageId, status) {
  const node = document.getElementById('stage-' + stageId);
  if (!node) return;
  node.className = node.className.replace(/status-\w+/, 'status-' + status);
  const icon = node.querySelector('[data-icon="' + stageId + '"]');
  if (icon) {
    icon.className = 'pill-icon ' + status;
    if (status === 'passed') icon.textContent = '✓';
    else if (status === 'failed') icon.textContent = '✗';
    else if (status === 'skipped') icon.textContent = '◌';
  }
}

function setStageProgress(stageId, completed, total, hasFailed) {
  const fill = document.querySelector('[data-progress="' + stageId + '"]');
  const text = document.querySelector('[data-progress-text="' + stageId + '"]');
  if (fill) {
    fill.style.width = (completed / total * 100) + '%';
    fill.style.background = hasFailed ? 'var(--failed)' : 'var(--passed)';
  }
  if (text) {
    text.textContent = completed + '/' + total + (hasFailed ? ' ✗' : completed === total ? ' ✓' : '');
    text.className = 'pill-progress' + (hasFailed ? ' failed' : completed === total ? ' passed' : '');
  }
}

function setStageSkipped(stageId, total) {
  const text = document.querySelector('[data-progress-text="' + stageId + '"]');
  if (text) {
    text.textContent = '0/' + total + ' (skipped)';
    text.className = 'pill-progress skipped';
  }
}

/* ─── Edge helpers ─── */
function getEdgeIndexForStage(stageIndex) {
  let edgeIdx = 0;
  for (let ri = 0; ri < ZIGZAG_ROWS.length; ri++) {
    const row = ZIGZAG_ROWS[ri];
    for (let i = 0; i < row.indices.length - 1; i++) {
      if (row.indices[i] === stageIndex) return edgeIdx;
      edgeIdx++;
    }
    if (ri < ZIGZAG_ROWS.length - 1) {
      const lastInRow = row.dir === 'ltr' ? row.indices[row.indices.length - 1] : row.indices[0];
      if (lastInRow === stageIndex) return edgeIdx;
      edgeIdx++;
    }
  }
  return -1;
}

function setEdge(stageIdx, type) {
  const ei = getEdgeIndexForStage(stageIdx);
  if (ei < 0) return;
  const path = document.querySelector('[data-edge="' + ei + '"]');
  const arrow = document.querySelector('[data-edge-arrow="' + ei + '"]');
  const dot = document.querySelector('[data-edge-dot="' + ei + '"]');
  [path, arrow].forEach(el => {
    if (!el) return;
    el.classList.remove('animated', 'error-path', 'error-path-dashed');
    if (type) el.classList.add(type);
  });
  if (dot) {
    dot.classList.remove('active');
    if (type === 'animated') {
      dot.classList.add('active');
      animateDot(dot, path);
    }
  }
}

function animateDot(dot, path) {
  if (!path || !dot) return;
  const len = path.getTotalLength();
  let start = null;
  const duration = 600;
  function step(ts) {
    if (!start) start = ts;
    const t = Math.min((ts - start) / duration, 1);
    const pt = path.getPointAtLength(t * len);
    dot.setAttribute('cx', pt.x);
    dot.setAttribute('cy', pt.y);
    if (t < 1 && dot.classList.contains('active')) requestAnimationFrame(step);
    else dot.classList.remove('active');
  }
  requestAnimationFrame(step);
}

/* ─── Step status helpers ─── */
function getStepElements(stageId) {
  const node = document.getElementById('stage-' + stageId);
  if (!node) return [];
  return Array.from(node.querySelectorAll('.step-row'));
}

function setStepStatus(stepEl, status) {
  const dot = stepEl.querySelector('[data-step-dot]');
  const label = stepEl.querySelector('[data-step-label]');
  if (dot) dot.className = 'step-dot ' + status;
  if (label) {
    label.classList.remove('skipped', 'failed');
    if (status === 'skipped') label.classList.add('skipped');
    if (status === 'failed') label.classList.add('failed');
  }
}

function showStepError(stepEl) {
  const box = stepEl.querySelector('[data-error-box]');
  if (box) box.style.display = 'block';
  const rec = stepEl.querySelector('[data-rec-box]');
  if (rec) rec.style.display = 'block';
}

/* ─── Reset ─── */
function resetPipeline() {
  if (simRunning) return;
  buildPipeline();
  updateSummary(0, 0, 0);
  updateErrorPanel([]);
  if (errorPanelOpen) toggleErrorPanel();
}

/* ─── Simulation ─── */
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function simulate() {
  if (simRunning) return;
  simRunning = true;
  const btn = document.getElementById('simBtn');
  btn.textContent = '⟳ Running...';
  btn.classList.add('running');

  resetPipeline();
  await sleep(400);

  const collectedErrors = [];
  let passedStages = 0, failedStages = 0, skippedStages = 0;
  let pipelineFailed = false;

  for (let si = 0; si < STAGES.length; si++) {
    const stage = STAGES[si];
    const stageNode = document.getElementById('stage-' + stage.id);

    if (pipelineFailed) {
      setStageStatus(stage.id, 'skipped');
      setStageSkipped(stage.id, stage.steps.length);
      getStepElements(stage.id).forEach(el => setStepStatus(el, 'skipped'));
      if (si > 0) setEdge(si - 1, 'error-path-dashed');
      skippedStages++;
      updateSummary(passedStages, failedStages, skippedStages);
      await sleep(300);
      continue;
    }

    if (si > 0) setEdge(si - 1, 'animated');
    setStageStatus(stage.id, 'running');
    stageNode.classList.add('expanded');
    requestAnimationFrame(() => drawEdges());
    stageNode.scrollIntoView({ behavior: 'smooth', block: 'center' });
    await sleep(400);

    const stepEls = getStepElements(stage.id);
    let stagePassedSteps = 0;
    let stageFailed = false;

    for (let sti = 0; sti < stage.steps.length; sti++) {
      const step = stage.steps[sti];
      const stepEl = stepEls[sti];
      if (!stepEl) continue;

      if (stageFailed) {
        setStepStatus(stepEl, 'skipped');
        setStageProgress(stage.id, stagePassedSteps, stage.steps.length, true);
        await sleep(80);
        continue;
      }

      setStepStatus(stepEl, 'running');
      await sleep(500 + Math.random() * 300);

      if (step.result === 'failed') {
        setStepStatus(stepEl, 'failed');
        showStepError(stepEl);
        stageFailed = true;
        pipelineFailed = true;
        stagePassedSteps++;
        setStageProgress(stage.id, stagePassedSteps, stage.steps.length, true);
        collectedErrors.push({
          stageId: stage.id,
          stageLabel: stage.label,
          stepIndex: sti,
          stepLabel: step.label,
          error: step.error,
          recommendations: step.recommendations || [],
        });
        await sleep(400);
      } else {
        setStepStatus(stepEl, 'passed');
        stagePassedSteps++;
        setStageProgress(stage.id, stagePassedSteps, stage.steps.length, false);
        await sleep(100);
      }
    }

    if (si > 0) {
      const ei = getEdgeIndexForStage(si - 1);
      const dot = document.querySelector('[data-edge-dot="' + ei + '"]');
      if (dot) dot.classList.remove('active');
    }

    if (stageFailed) {
      setStageStatus(stage.id, 'failed');
      if (si > 0) setEdge(si - 1, 'error-path');
      failedStages++;
    } else {
      setStageStatus(stage.id, 'passed');
      setStageProgress(stage.id, stage.steps.length, stage.steps.length, false);
      passedStages++;
    }

    updateSummary(passedStages, failedStages, skippedStages);
    await sleep(300);
  }

  updateErrorPanel(collectedErrors);
  if (collectedErrors.length > 0 && !errorPanelOpen) toggleErrorPanel();

  btn.textContent = '▶ Simulate Execution';
  btn.classList.remove('running');
  simRunning = false;
}

/* ─── Init ─── */
buildPipeline();
updateErrorPanel([]);
</script>
</body>
</html>
