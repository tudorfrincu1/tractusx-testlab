kind: template
name: transfer-dataplane-access
version: "1.0"
description: Initiate a data transfer and obtain dataplane access credentials (EDR).

inputs:
  contract_agreement_id:
    type: str
    description: The contract agreement ID from a completed negotiation

outputs:
  - data_address
  - edr_token
  - transfer_process_id

steps:
  - type: initiate_transfer
    name: Initiate Transfer
    params:
      contract_agreement_id: "@contract_agreement_id"
      counter_party_address: "@counter_party_address"
      counter_party_id: "@counter_party_id"
    store_in_memory:
      transfer_process_id: "transfer_process_id"
    expect:
      - output: status_code
        equals: 200

  - type: retry
    name: Wait for Transfer Started
    params:
      max_retries: 10
      delay_s: 2
      steps:
        - type: query_catalog
          name: Check Transfer State
          params:
            check_type: transfer
            resource_id: "@transfer_process_id"
          store_in_memory:
            transfer_state: "state"
      until:
        output: transfer_state
        equals: "STARTED"

  - type: http_call
    name: Fetch EDR Token
    params:
      method: GET
      path: "/edrs/@transfer_process_id"
    store_in_memory:
      edr_token: "authorization"
      data_address: "endpoint"
    expect:
      - output: status_code
        equals: 200
