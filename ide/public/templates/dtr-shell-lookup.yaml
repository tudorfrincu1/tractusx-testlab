kind: template
name: dtr-shell-lookup
version: "1.0"
description: Call the Digital Twin Registry shell-descriptors endpoint via dataplane.

inputs:
  data_address:
    type: str
    description: Dataplane URL obtained from transfer
  edr_token:
    type: str
    description: EDR authorization token
  query_path:
    type: str
    default: "/shell-descriptors"
    description: DTR API path to query

outputs:
  - shell_descriptors
  - response_body

steps:
  - type: http_call_dataplane
    name: Fetch Shell Descriptors
    params:
      dataplane_url: "@data_address"
      edr_token: "@edr_token"
      method: GET
      path: "@query_path"
    store_in_memory:
      shell_descriptors: "response_body"
      response_body: "response_body"
    validate:
      - type: "EQUALS"
        output: status_code
        value: 200
      - type: "NOT_EMPTY"
        output: response_body
