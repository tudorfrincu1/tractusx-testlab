kind: template
name: catalog-negotiation
version: "1.0"
description: Query catalog for offers, extract dataset, negotiate contract, wait for agreement.

inputs:
  counter_party_address:
    type: str
    description: DSP endpoint of the counter-party connector
  counter_party_id:
    type: str
    description: BPN of the counter-party
  asset_type_filter:
    type: str
    default: "%"
    description: SQL LIKE filter on asset type

outputs:
  - contract_agreement_id
  - offer_id
  - asset_id

steps:
  - type: query_catalog
    name: Query Catalog
    params:
      counter_party_address: "@counter_party_address"
      counter_party_id: "@counter_party_id"
      query_spec:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "like"
            operand_right: "@asset_type_filter"
    store_in_memory:
      catalog_datasets: "datasets"
    expect:
      - output: status_code
        equals: 200

  - type: extract_dataset
    name: Select First Offer
    params:
      variable: catalog_datasets
      index: 0
    store_in_memory:
      offer_id: "offer_id"
      asset_id: "asset_id"

  - type: negotiate_contract
    name: Negotiate Contract
    params:
      counter_party_address: "@counter_party_address"
      counter_party_id: "@counter_party_id"
      offer_id: "@offer_id"
      asset_id: "@asset_id"
    store_in_memory:
      negotiation_id: "negotiation_id"
    expect:
      - output: status_code
        equals: 200

  - type: retry
    name: Wait for Agreement
    params:
      max_retries: 10
      delay_s: 2
      steps:
        - type: query_catalog
          name: Check Negotiation State
          params:
            check_type: negotiation
            resource_id: "@negotiation_id"
          store_in_memory:
            negotiation_state: "state"
            contract_agreement_id: "contract_agreement_id"
      until:
        output: negotiation_state
        equals: "FINALIZED"
