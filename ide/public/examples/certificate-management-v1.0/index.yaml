## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: tck
name: certificate-management
version: "1.0"
description: >
  Validate CCMAPI certificate management workflow per CX-0135 v2.4.0:
  (1) Request certificate from provider
  (2) Validate certificate payload against schema
  (3) Await provider feedback callback
  (4) Send feedback notification and await acknowledgment
  (5) Expose TestLab as provider and verify SUT consumer behavior

shared_variables:
  provider_address:
    type: str
    description: Provider EDC DSP endpoint
    runtime: true
  provider_bpn:
    type: str
    description: Provider BPNL (Business Partner Number)
    runtime: true
  consumer_bpn:
    type: str
    description: Consumer BPNL (TestLab company)
    runtime: true
  certificate_type:
    type: str
    description: Certificate type to request (iso9001, iatf16949, iso14001, iso45001, iso50001)
    default: "iso9001"
  location_bpns:
    type: str
    description: Comma-separated BPN sites needing the certificate (BPNS format)
    runtime: true
  testlab_management_url:
    type: str
    description: TestLab EDC management API base URL (used when TestLab acts as provider)
    runtime: true
  testlab_dsp_url:
    type: str
    description: TestLab EDC DSP endpoint — what the SUT must point its catalog query at
    runtime: true
  sut_response_timeout:
    type: int
    description: Seconds to wait for SUT to negotiate and pull data from TestLab
    default: 300

tests:
  - test: tests/request_certificate.yaml
    description: Query provider catalog for CCMAPI offer and request certificate
  - test: tests/validate_payload.yaml
    description: Fetch and validate certificate payload against BusinessPartnerCertificate semantic model v3.1.0
  - test: tests/await_feedback_callback.yaml
    description: Listen for inbound provider feedback callback on /companycertificate/status
  - test: tests/send_feedback.yaml
    description: Send CCMAPI feedback notification to provider and await acknowledgment
  - test: tests/expose_testlab_asset.yaml
    description: Register a CCMAPI asset in TestLab EDC, expose mock data, and verify SUT consumer behavior

