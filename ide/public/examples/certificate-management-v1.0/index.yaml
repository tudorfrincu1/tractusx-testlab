kind: test-case
name: certificate-management
version: "1.0"
description: Validate CCMAPI certificate management compliance — offer discovery, validation, and feedback.

standards:
  - id: CX-0135

variables:
  counter_party_address:
    type: str
    description: DSP endpoint of the counter-party connector
  counter_party_id:
    type: str
    description: BPN of the counter-party

tests:
  - test: tests/ccmapi_offer_test.yaml
    description: Verify CCMAPI offer is available in catalog
  - test: tests/cert_validation_test.yaml
    description: Fetch and validate certificate payload
  - test: tests/feedback_mechanism_test.yaml
    description: Send feedback message via CCMAPI dataplane
