## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: certificate-asset-validation
version: "1.0"
dataspace_version: "saturn"
description: >
  Validate that certificate Submodel assets in the provider catalog have
  the required CX-0135 properties: aas:semanticId, dct:certificateType,
  and dct:enclosedSites.

services:
  - name: provider_edc
    type: edc_connector_saturn
    config:
      base_url: "@provider_address"
      dma_path: /management

steps:
  - type: query_catalog_with_filters
    description: Query provider catalog for certificate Submodel assets
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#Submodel"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificate"
    validate:
      - type: "NOT_NULL"
        output: datasets
      - type: "json_path_extract"
        output: datasets
        json_path: "[0]"
        store_in_variable: cert_asset
        validate:
          - type: "NOT_NULL"
            output: cert_asset

  - type: generate_uuid
    description: Placeholder step to separate validations
    params:
      store_in_variable: _validation_marker

  - type: query_catalog_with_filters
    description: Validate aas:semanticId property on certificate asset
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#Submodel"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificate"
          - operand_left: "https://admin-shell.io/aas/3/0/HasSemantics/semanticId"
            operator: "="
            operand_right: "urn:samm:io.catenax.business_partner_certificate:3.1.0#BusinessPartnerCertificate"
    validate:
      - type: "NOT_NULL"
        output: datasets
        description: "Asset must have aas:semanticId matching BPC v3.1.0"
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].['dct:certificateType']"
        store_in_variable: cert_type_prop
        validate:
          - type: "NOT_NULL"
            output: cert_type_prop
            description: "Asset must declare dct:certificateType property"
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].['dct:enclosedSites']"
        store_in_variable: enclosed_sites_prop
        validate:
          - type: "NOT_NULL"
            output: enclosed_sites_prop
            description: "Asset must declare dct:enclosedSites property"
