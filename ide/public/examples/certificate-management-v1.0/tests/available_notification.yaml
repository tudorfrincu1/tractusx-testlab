## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: available-notification
version: "1.0"
dataspace_version: "saturn"
description: >
  Test CX-0135 AVAILABLE notification: send availability notification to SUT
  and verify SUT subsequently pulls the certificate from TestLab.

services:
  - name: provider_edc
    type: edc_connector_saturn
    config:
      base_url: "@provider_address"
      dma_path: /management

setup:
  - type: mock_endpoint
    description: Expose mock endpoint for SUT certificate pull request
    params:
      id: "avail_cert_pull"
      method: GET
      path: "/api/v1/companycertificate/available"
      response_status: 200
      response_body:
        businessPartnerNumber: "@provider_bpn"
        certificateType: "@certificate_type"
        registrationNumber: "CERT-AVAIL-001"
        enclosedSites:
          - enclosedSiteBpn: "@location_bpns"
        validFrom: "2026-01-01"
        validUntil: "2028-12-31"
        trustLevel: "none"
        document:
          documentID: "cert-asset-001"
          creationDate: "2026-01-01T00:00:00Z"
          contentType: "application/pdf"
          contentBase64: "iVBORw0KGgoAAAANSUhEUgA="
        validator:
          validatorName: "TÜV SÜD"
          validatorBpn: "BPNL133631123120"
        type:
          certificateVersion: "2015"
          certificateType: "@certificate_type"
        areaOfApplication: "Quality Management"
        issuer:
          issuerName: "TÜV SÜD"
          issuerBpn: "BPNL133631123120"

steps:
  # ── Catalog → Negotiate → Transfer (shortcut) ─────────────────────
  - type: pull_data_filtered_from_precondition
    description: Discover CCMAPI notification endpoint and obtain dataplane credentials
    params:
      service: provider_edc
      counter_party_id: "@provider_bpn"
      counter_party_address: "@provider_address"
      precondition_policy_var: ccmapi_usage_policy
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "http://purl.org/dc/terms/subject"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    validate:
      - type: "NOT_NULL"
        output: edr_token
      - type: "NOT_NULL"
        output: dataplane_url
    store_in_memory:
      edr_token: "edr_token"
      dataplane_url: "dataplane_url"

  - type: generate_uuid
    description: Generate available notification message ID
    params:
      store_in_variable: avail_message_id

  - type: http_call_dataplane
    description: Send certificate available notification to SUT
    params:
      method: POST
      dataplane_url: "@dataplane_url"
      path: "/companycertificate/available"
      edr_token: "@edr_token"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:@avail_message_id"
          context: "CompanyCertificateManagement-CCMAPI-Available:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "@consumer_bpn"
          receiverBpn: "@provider_bpn"
          relatedMessageId: "urn:uuid:@avail_message_id"
          version: "3.1.0"
          senderFeedbackUrl: "@testlab_dsp_url"
        content:
          documentId: "cert-asset-001"
          certificateType: "@certificate_type"
          locationBpns:
            - "@location_bpns"
    validate:
      - type: "EQUALS"
        output: status_code
        value: 200

  - type: wait_for_call
    description: Wait for SUT to pull the certificate from TestLab
    params:
      endpoint_id: "avail_cert_pull"
      timeout_s: "@sut_response_timeout"
    validate:
      - type: "EQUALS"
        output: method
        value: "GET"
