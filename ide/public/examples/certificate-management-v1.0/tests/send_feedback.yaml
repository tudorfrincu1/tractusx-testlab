## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: send-feedback-notification
version: "1.0"
dataspace_version: "saturn"
description: >
  Send a CCMAPI feedback notification to the provider via EDC dataplane (SEND direction)
  and await the provider's RECEIVE acknowledgment on a TestLab mock endpoint.

services:
  - name: provider_edc
    type: connector_consumer
    base_url: "@provider_address"

setup:
  - type: mock_endpoint
    description: Expose mock endpoint for provider RECEIVE acknowledgment
    params:
      id: "notification_receive_ack"
      method: POST
      path: "/companycertificate/notification/receive"
      response_status: 200
      response_body:
        received: true

steps:
  - type: query_catalog
    description: Find CCMAPI notification endpoint in provider catalog
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "like"
            operand_right: "%https://w3id.org/catenax/taxonomy#CCMAPI%"
    store_in_memory:
      notification_catalog: "catalog"
      notification_datasets: "datasets"
    expect:
      - type: "NOT_NULL"
        output: datasets

  - type: json_path_extract
    description: Extract notification asset ID from catalog datasets
    params:
      variable: "notification_datasets"
      path: "[0].@id"
    store_in_memory:
      notification_asset_id: "value"
    expect:
      - type: "NOT_NULL"
        output: value

  - type: json_path_extract
    description: Extract notification offer policies
    params:
      variable: "notification_datasets"
      path: "[0].odrl:hasPolicy"
    store_in_memory:
      notification_offer_id: "value"
    expect:
      - type: "NOT_NULL"
        output: value

  - type: negotiate
    description: Negotiate contract for notification channel
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      offer_id: "@notification_offer_id"
      asset_id: "@notification_asset_id"
    store_in_memory:
      notification_agreement_id: "agreement_id"
    expect:
      - type: "NOT_NULL"
        output: agreement_id

  - type: initiate_transfer
    description: Initiate transfer for dataplane access
    params:
      service: provider_edc
      agreement_id: "@notification_agreement_id"
      asset_id: "@notification_asset_id"
      transfer_type: "HttpData-PULL"
    store_in_memory:
      notification_dataplane_url: "data_address"
      notification_edr_token: "edr_token"

  - type: generate_uuid
    description: Generate notification ID
    store_in_memory:
      notification_id: "uuid"

  - type: http_call_dataplane
    description: Send CCMAPI feedback notification to provider via dataplane
    params:
      method: POST
      url: "@notification_dataplane_url"
      edr_token: "@notification_edr_token"
      headers:
        Content-Type: "application/json"
      body:
        header:
          notificationId: "@notification_id"
          senderBPN: "@consumer_bpn"
          recipientBPN: "@provider_bpn"
          type: "SEND"
          status: "SENT"
        content:
          requestId: "@request_id"
          feedbackType: "CERTIFICATE_FEEDBACK"
          message: "Validation completed for certificate request"
    expect:
      - type: "EQUALS"
        output: status_code
        value: 200

  - type: wait_for_call
    description: Wait for provider RECEIVE acknowledgment
    params:
      endpoint_id: "notification_receive_ack"
      timeout_s: 60
    store_in_memory:
      ack_payload: "body"
    expect:
      - type: "EQUALS"
        output: method
        value: "POST"

  - type: json_path_extract
    description: Extract acknowledgment status from provider response
    params:
      variable: "ack_payload"
      path: "status"
    store_in_memory:
      notification_ack_status: "value"
    expect:
      - type: "NOT_NULL"
        output: value
