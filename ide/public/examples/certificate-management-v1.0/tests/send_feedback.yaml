## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: send-feedback-notification
version: "1.0"
dataspace_version: "saturn"
description: >
  Send a CX-0135 CCMAPI status notification to the provider via EDC dataplane
  and await the provider's acknowledgment on a TestLab mock endpoint.

services:
  - name: provider_edc
    type: connector_consumer
    base_url: "@provider_address"

setup:
  - type: import_variable
    description: Import request ID from request test
    params:
      test: request-certificate
      select: request_id
      store_in_variable: request_id

  - type: import_variable
    description: Import document ID from request test
    params:
      test: request-certificate
      select: document_id
      store_in_variable: document_id

  - type: mock_endpoint
    description: Expose mock endpoint for provider RECEIVE acknowledgment
    params:
      id: "notification_receive_ack"
      method: POST
      path: "/companycertificate/notification/receive"
      response_status: 200
      response_body:
        received: true

steps:
  - type: query_catalog_with_filters
    description: Find CCMAPI endpoint in provider catalog
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
          - operand_left: "https://w3id.org/catenax/ontology/common#version"
            operator: "="
            operand_right: "3.0"
    store_in_memory:
      notification_datasets: "datasets"
    expect:
      - type: "NOT_NULL"
        output: datasets

  - type: json_path_extract
    description: Extract notification asset ID from catalog datasets
    params:
      variable: "notification_datasets"
      path: "[0].@id"
      store_in_variable: notification_asset_id
    expect:
      - type: "NOT_NULL"
        output: value

  - type: json_path_extract
    description: Extract notification offer policies
    params:
      variable: "notification_datasets"
      path: "[0].odrl:hasPolicy"
      store_in_variable: notification_offer_id
    expect:
      - type: "NOT_NULL"
        output: value

  - type: negotiate
    description: Negotiate contract for notification channel
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      offer_id: "@notification_offer_id"
      asset_id: "@notification_asset_id"
      store_in_variable: notification_agreement_id
    expect:
      - type: "NOT_NULL"
        output: agreement_id

  - type: initiate_transfer
    description: Initiate transfer for dataplane access
    params:
      service: provider_edc
      agreement_id: "@notification_agreement_id"
      asset_id: "@notification_asset_id"
      transfer_type: "HttpData-PULL"
    store_in_memory:
      notification_dataplane_url: "data_address"
      notification_edr_token: "edr_token"

  - type: generate_uuid
    description: Generate feedback message ID
    params:
      store_in_variable: feedback_uuid

  - type: http_call_dataplane
    description: Send CX-0135 status notification to provider via dataplane
    params:
      method: POST
      url: "@notification_dataplane_url/companycertificate/status"
      edr_token: "@notification_edr_token"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:@feedback_uuid"
          context: "CompanyCertificateManagement-CCMAPI-Status:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "@consumer_bpn"
          receiverBpn: "@provider_bpn"
          relatedMessageId: "urn:uuid:@request_id"
          version: "3.1.0"
          senderFeedbackUrl: "@testlab_dsp_url"
        content:
          documentId: "@document_id"
          certificateStatus: "ACCEPTED"
          locationBpns:
            - "@location_bpns"
    expect:
      - type: "EQUALS"
        output: status_code
        value: 200

  - type: wait_for_call
    description: Wait for provider RECEIVE acknowledgment
    params:
      endpoint_id: "notification_receive_ack"
      timeout_s: 60
    store_in_memory:
      ack_payload: "body"
    expect:
      - type: "EQUALS"
        output: method
        value: "POST"

  - type: json_path_extract
    description: Extract acknowledgment certificate status
    params:
      variable: "ack_payload"
      path: "content.certificateStatus"
    store_in_memory:
      notification_ack_status: "value"
    expect:
      - type: "NOT_NULL"
        output: value
