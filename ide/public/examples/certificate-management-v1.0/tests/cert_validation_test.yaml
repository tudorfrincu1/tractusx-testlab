kind: test
name: cert-validation-test
version: "1.0"
description: Fetch certificate data via CCMAPI and validate against schema.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

setup:
  - type: import_variable
    name: Import data_address
    params:
      file: tests/ccmapi_offer_test.yaml
      export: data_address
      variable: data_address
  - type: import_variable
    name: Import edr_token
    params:
      file: tests/ccmapi_offer_test.yaml
      export: edr_token
      variable: edr_token

steps:
  - type: http_call_dataplane
    name: Fetch Certificate Data
    params:
      dataplane_url: "@data_address"
      edr_token: "@edr_token"
      method: GET
      path: /certificates
    store_in_memory:
      certificate_data: "response_body"
    expect:
      - output: status_code
        equals: 200

  - type: load_schema
    name: Load MessageContentAspect Schema
    params:
      name: MessageContentAspect_schema
      source: file
      path: ../schemas/MessageContentAspect-schema.json

  - type: validate_semantic_schema
    name: Validate Certificate Message Structure
    params:
      variable: certificate_data
      schema_variable: MessageContentAspect_schema
    expect:
      - output: is_valid
        equals: true

variables:
  certificate_data:
    type: str
