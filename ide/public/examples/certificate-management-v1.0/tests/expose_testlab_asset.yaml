## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: expose-testlab-asset
version: "1.0"
dataspace_version: "saturn"
description: >
  TestLab registers a CCMAPI-type asset in its own EDC connector, exposes a mock
  data endpoint, and waits for the SUT to discover, negotiate, and pull data.
  Verifies the SUT's consumer-side behavior per CX-0135.

services:
  - name: testlab_edc
    type: edc_connector_saturn
    base_url: "@testlab_management_url"

setup:
  - type: create_asset
    description: Register CCMAPI asset in TestLab EDC
    params:
      service: testlab_edc
      name: "TestLab CCMAPI Endpoint"
      description: "CCMAPI data endpoint for SUT consumer testing"
      base_url: "@testlab_mock_base_url/api/v1/companycertificate"
      content_type: "application/json"
      properties:
        dct:type:
          "@id": "https://w3id.org/catenax/taxonomy#CCMAPI"
        cx-common:version: "2.4.0"
    store_in_memory:
      testlab_asset_id: "asset_id"
    expect:
      - type: "NOT_NULL"
        output: asset_id

  - type: create_policy
    description: Create BPN-restricted access policy for SUT
    params:
      service: testlab_edc
      permissions:
        - action: "use"
          constraints:
            - leftOperand: "BusinessPartnerNumber"
              operator: "eq"
              rightOperand: "@provider_bpn"
    store_in_memory:
      testlab_policy_id: "policy_id"
    expect:
      - type: "NOT_NULL"
        output: policy_id

  - type: create_contract_def
    description: Create contract definition linking asset to policy
    params:
      service: testlab_edc
      access_policy_id: "@testlab_policy_id"
      contract_policy_id: "@testlab_policy_id"
      asset_selector:
        - operandLeft: "https://w3id.org/edc/v0.0.1/ns/id"
          operator: "="
          operandRight: "@testlab_asset_id"
    store_in_memory:
      testlab_contract_def_id: "contract_def_id"
    expect:
      - type: "NOT_NULL"
        output: contract_def_id

  - type: mock_endpoint
    description: Expose mock CCMAPI data endpoint for SUT
    params:
      id: "ccmapi_data_source"
      method: GET
      path: "/api/v1/companycertificate"
      response_status: 200
      response_body:
        businessPartnerNumber: "@provider_bpn"
        type: "CCMAPI_DATA"
        status: "ACTIVE"

steps:
  - type: wait_for_call
    description: Wait for SUT to discover, negotiate, and pull data
    params:
      endpoint_id: "ccmapi_data_source"
      timeout_s: "@sut_response_timeout"
    store_in_memory:
      sut_request_body: "body"
    expect:
      - type: "EQUALS"
        output: method
        value: "GET"
      - type: "NOT_NULL"
        output: body

cleanup:
  - type: delete_asset
    description: Remove CCMAPI asset from TestLab EDC
    params:
      service: testlab_edc
      asset_id: "@testlab_asset_id"

  - type: delete_policy
    description: Remove access policy from TestLab EDC
    params:
      service: testlab_edc
      policy_id: "@testlab_policy_id"

  - type: delete_contract_definition
    description: Remove contract definition from TestLab EDC
    params:
      service: testlab_edc
      contract_def_id: "@testlab_contract_def_id"
