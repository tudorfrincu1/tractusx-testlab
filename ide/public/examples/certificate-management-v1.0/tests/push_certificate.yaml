## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: push-certificate
version: "1.0"
dataspace_version: "saturn"
description: >
  Test CX-0135 PUSH mechanism: push certificate to SUT and verify SUT sends
  a feedback callback with correct relatedMessageId and valid certificateStatus.

services:
  - name: provider_edc
    type: edc_connector_saturn
    config:
      base_url: "@provider_address"
      dma_path: /management

setup:
  - type: mock_endpoint
    description: Expose mock endpoint for SUT feedback callback
    params:
      id: "push_feedback_callback"
      method: POST
      path: "/companycertificate/status"
      response_status: 200

steps:
  # ── Catalog → Negotiate → Transfer (shortcut) ─────────────────────
  - type: pull_data_filtered_from_precondition
    description: Discover CCMAPI notification endpoint and obtain dataplane credentials
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      precondition_policy: ccmapi_usage_policy
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "http://purl.org/dc/terms/subject"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
      transfer_type: "HttpData-PULL"
    validate:
      - type: "NOT_NULL"
        output: datasets
      - type: "NOT_NULL"
        output: asset_id
      - type: "NOT_NULL"
        output: negotiation_id
      - type: "NOT_NULL"
        output: transfer_process_id
      - type: "NOT_NULL"
        output: edr_token
      - type: "NOT_NULL"
        output: dataplane_url
    store_in_memory:
      catalog: "catalog"
      datasets: "datasets"
      asset_id: "asset_id"
      negotiation_id: "negotiation_id"
      transfer_process_id: "transfer_process_id"
      edr_token: "edr_token"
      dataplane_url: "dataplane_url"

  - type: generate_uuid
    description: Generate push message ID
    params:
      store_in_variable: push_message_id

  - type: http_call_dataplane
    description: Push certificate to SUT via data plane
    params:
      method: POST
      dataplane_url: "@dataplane_url"
      path: "/companycertificate/push"
      edr_token: "@edr_token"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:@push_message_id"
          context: "CompanyCertificateManagement-CCMAPI-Push:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "@consumer_bpn"
          receiverBpn: "@provider_bpn"
          relatedMessageId: "urn:uuid:@push_message_id"
          version: "3.1.0"
          senderFeedbackUrl: "@testlab_dsp_url"
        content:
          businessPartnerNumber: "@provider_bpn"
          enclosedSites:
            - enclosedSiteBpn: "@location_bpns"
          registrationNumber: "CERT-PUSH-001"
          uploader: "@consumer_bpn"
          document:
            documentID: "UUID--PUSH-001"
            creationDate: "2026-01-01T00:00:00Z"
            contentType: "application/pdf"
            contentBase64: "iVBORw0KGgoAAAANSUhEUgA="
          validator:
            validatorName: "TÜV SÜD"
            validatorBpn: "BPNL133631123120"
          validUntil: "2028-12-31"
          validFrom: "2026-01-01"
          trustLevel: "none"
          type:
            certificateVersion: "2015"
            certificateType: "@certificate_type"
          areaOfApplication: "Quality Management"
          issuer:
            issuerName: "TÜV SÜD"
            issuerBpn: "BPNL133631123120"
    validate:
      - type: "EQUALS"
        output: status_code
        value: 200

  - type: wait_for_call
    description: Wait for SUT feedback callback with status acknowledgment
    params:
      endpoint_id: "push_feedback_callback"
      timeout_s: "@sut_response_timeout"
    store_in_memory:
      feedback_body: "body"
    validate:
      - type: "EQUALS"
        output: method
        value: "POST"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "header.messageId"
        operator: "matches_regex"
        value: "^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "header.context"
        operator: "eq"
        value: "CompanyCertificateManagement-CCMAPI-Status:1.0.0"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "header.sentDateTime"
        operator: "not_null"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "header.senderBpn"
        operator: "matches_regex"
        value: "^BPNL[0-9A-Z]{12}$"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "header.receiverBpn"
        operator: "eq"
        value: "@consumer_bpn"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "header.relatedMessageId"
        operator: "eq"
        value: "urn:uuid:@push_message_id"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "header.version"
        operator: "eq"
        value: "3.1.0"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "content.certificateStatus"
        operator: "one_of"
        value:
          - "RECEIVED"
          - "ACCEPTED"
          - "REJECTED"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "content.documentId"
        operator: "eq"
        value: "UUID--PUSH-001"
      - type: "ASSERT_FIELD"
        output: feedback_body
        path: "content.locationBpns"
        operator: "not_null"
