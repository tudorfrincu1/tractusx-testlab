kind: test
name: ccmapi-offer-test
version: "1.0"
description: Verify that the CCMAPI offer is present and has a valid policy in the catalog.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

steps:
  - template: catalog-negotiation
    params:
      counter_party_address: "@counter_party_address"
      counter_party_id: "@counter_party_id"
      asset_type_filter: "%https://w3id.org/catenax/taxonomy#CCMAPI%"

  - type: validate_policy
    name: Validate CCMAPI Policy
    params:
      variable: catalog_datasets
    expect:
      - output: is_valid
        equals: true

  - template: transfer-dataplane-access
    params:
      contract_agreement_id: "@contract_agreement_id"

teardown:
  - type: export_variable
    name: Export contract_agreement_id
    params:
      name: contract_agreement_id
      value: "@contract_agreement_id"
  - type: export_variable
    name: Export data_address
    params:
      name: data_address
      value: "@data_address"
  - type: export_variable
    name: Export edr_token
    params:
      name: edr_token
      value: "@edr_token"
