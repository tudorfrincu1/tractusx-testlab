## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: catalog-policy-validation
version: "1.0"
dataspace_version: "saturn"
description: >
  Validate CX-0135 catalog requirements: exactly one CCMAPI asset per BPNL
  and mandatory usage policy constraints (UsagePurpose: cx.ccm.base:1,
  FrameworkAgreement: DataExchangeGovernance:1.0).

services:
  - name: provider_edc
    type: edc_connector_saturn
    config:
      base_url: "@provider_address"
      dma_path: /management

steps:
  - type: query_catalog_with_filters
    description: Query provider catalog for all CCMAPI assets
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
          - operand_left: "https://w3id.org/catenax/ontology/common#version"
            operator: "="
            operand_right: "3.0"
    validate:
      - type: "NOT_NULL"
        output: datasets
      - type: "ASSERT_FIELD"
        output: datasets
        path: "length()"
        operator: "eq"
        value: 1
        description: "Exactly one CCMAPI asset must exist per BPNL"
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].@id"
        store_in_variable: ccmapi_asset_id
        validate:
          - type: "NOT_NULL"
            output: ccmapi_asset_id
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].odrl:hasPolicy"
        store_in_variable: ccmapi_policy
        validate:
          - type: "NOT_NULL"
            output: ccmapi_policy

  - type: json_path_extract
    description: Extract permission constraints from policy
    params:
      input: "@ccmapi_policy"
      json_path: "odrl:permission[0].odrl:constraint.odrl:and"
      store_in_variable: policy_constraints
    validate:
      - type: "NOT_NULL"
        output: policy_constraints

  - type: json_path_extract
    description: Extract UsagePurpose constraint value
    params:
      input: "@policy_constraints"
      json_path: "[?(@.odrl:leftOperand=='UsagePurpose')].odrl:rightOperand"
      store_in_variable: usage_purpose_value
    validate:
      - type: "EQUALS"
        output: usage_purpose_value
        value: "cx.ccm.base:1"
        description: "UsagePurpose must be cx.ccm.base:1"

  - type: json_path_extract
    description: Extract FrameworkAgreement constraint value
    params:
      input: "@policy_constraints"
      json_path: "[?(@.odrl:leftOperand=='FrameworkAgreement')].odrl:rightOperand"
      store_in_variable: framework_agreement_value
    validate:
      - type: "EQUALS"
        output: framework_agreement_value
        value: "DataExchangeGovernance:1.0"
        description: "FrameworkAgreement must be DataExchangeGovernance:1.0"
