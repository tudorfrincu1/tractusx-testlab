## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: request-certificate
version: "1.0"
dataspace_version: "saturn"
description: >
  Request certificate via CCMAPI endpoint per CX-0135 v3.1.0.
  Query catalog for CCMAPI offers (dct:type + dct:subject + cx-common:version),
  negotiate contract, and POST certificate request with header+content envelope.

services:
  - name: provider_edc
    type: connector_consumer
    base_url: "@provider_address"

steps:
  - type: query_catalog
    description: Discover CCMAPI offers in provider catalog
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
          - operand_left: "https://w3id.org/catenax/ontology/common#version"
            operator: "="
            operand_right: "3.0"
    expect:
      - type: "NOT_NULL"
        output: datasets

  - type: json_path_extract
    description: Extract CCMAPI asset ID from catalog datasets
    params:
      variable: "datasets"
      path: "[0].@id"
      store_in_variable: ccmapi_asset_id
    expect:
      - type: "NOT_NULL"
        output: value

  - type: json_path_extract
    description: Extract CCMAPI offer policies
    params:
      variable: "datasets"
      path: "[0].odrl:hasPolicy"
      store_in_variable: ccmapi_offer_id
    expect:
      - type: "NOT_NULL"
        output: value

  - type: negotiate
    description: Negotiate contract for CCMAPI asset
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      offer_id: "@ccmapi_offer_id"
      asset_id: "@ccmapi_asset_id"
      store_in_variable: contract_agreement_id
    expect:
      - type: "NOT_NULL"
        output: agreement_id

  - type: initiate_transfer
    description: Get dataplane access credentials
    params:
      service: provider_edc
      agreement_id: "@contract_agreement_id"
      asset_id: "@ccmapi_asset_id"
      transfer_type: "HttpData-PULL"

  - type: generate_uuid
    description: Generate request message ID
    params:
      store_in_variable: request_uuid

  - type: http_call_dataplane
    description: POST certificate request to CCMAPI endpoint via data plane
    params:
      method: POST
      url: "@data_address/companycertificate/request"
      edr_token: "@edr_token"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:@request_uuid"
          context: "CompanyCertificateManagement-CCMAPI-Request:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "@consumer_bpn"
          receiverBpn: "@provider_bpn"
          relatedMessageId: "urn:uuid:@request_uuid"
          version: "3.1.0"
          senderFeedbackUrl: "@testlab_dsp_url"
        content:
          certifiedBpn: "@provider_bpn"
          certificateType: "@certificate_type"
          locationBpns:
            - "@location_bpns"
    store_in_memory:
      request_status: "response_body.content.requestStatus"
      document_id: "response_body.content.documentId"
      request_id: "response_body.header.relatedMessageId"
    expect:
      - type: "EQUALS"
        output: status_code
        value: 200
      - type: "ASSERT_FIELD"
        output: response_body
        path: "content.requestStatus"
        operator: "not_null"
      - type: "ASSERT_FIELD"
        output: response_body
        path: "content.documentId"
        operator: "not_null"

teardown:
  - type: export_variable
    description: Export request ID for downstream tests
    params:
      name: request_id

  - type: export_variable
    description: Export document ID for payload validation
    params:
      name: document_id

  - type: export_variable
    description: Export data address for payload fetch
    params:
      name: data_address

  - type: export_variable
    description: Export EDR token for downstream tests
    params:
      name: edr_token


