## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: request-certificate
version: "1.0"
description: >
  Request certificate via CCMAPI endpoint.
  Query catalog for CCMAPI offers, negotiate contract,
  and POST certificate request to provider.

services:
  - name: provider_edc
    type: edc_connector_saturn
    config:
      management_url: "@provider_address"

output_definitions:
  - name: request_id
    type: str
    description: Unique certificate request ID from provider
  - name: request_status
    type: str
    description: Current status of the certificate request
  - name: document_id
    type: str
    description: Document ID for the requested certificate

steps:
  - type: query_catalog
    description: Discover CCMAPI offers in provider catalog
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "like"
            operand_right: "%https://w3id.org/catenax/taxonomy#CCMAPI%"
    store_in_memory:
      catalog: "catalog"
      datasets: "datasets"
    expect:
      - output: datasets
        not_null: true

  - type: extract_dataset
    description: Extract CCMAPI dataset and offer details
    params:
      variable: "catalog"
      dct_type: "https://w3id.org/catenax/taxonomy#CCMAPI"
    store_in_memory:
      ccmapi_asset_id: "asset_id"
      ccmapi_offer_id: "policies"
    expect:
      - output: dataset
        not_null: true

  - type: negotiate
    description: Negotiate contract for CCMAPI asset
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      offer_id: "@ccmapi_offer_id"
      asset_id: "@ccmapi_asset_id"
    store_in_memory:
      contract_agreement_id: "agreement_id"
    expect:
      - output: agreement_id
        not_null: true

  - type: initiate_transfer
    description: Get dataplane access credentials
    params:
      service: provider_edc
      agreement_id: "@contract_agreement_id"
      asset_id: "@ccmapi_asset_id"
      transfer_type: "HttpData-PULL"
    store_in_memory:
      data_address: "data_address"
      edr_token: "edr_token"

  - type: http_call
    description: POST certificate request to CCMAPI endpoint
    params:
      method: POST
      url: "@data_address/companycertificate/request"
      headers:
        Content-Type: "application/json"
      body:
        consumerBpn: "@consumer_bpn"
        providerBpn: "@provider_bpn"
        certificateType: "@certificate_type"
        locationBpns: "@location_bpns"
        requestedByDate: "2026-12-31"
    store_in_memory:
      request_id: "request_id"
      request_status: "request_status"
      document_id: "document_id"
    expect:
      - output: status_code
        equals: 200
      - output: request_id
        not_null: true
      - output: request_status
        not_null: true

variables:
  request_id:
    type: str
  request_status:
    type: str
  document_id:
    type: str

