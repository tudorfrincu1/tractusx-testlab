kind: test
name: feedback-mechanism-test
version: "1.0"
description: Send a feedback message via the CCMAPI dataplane endpoint.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

setup:
  - type: import_variable
    name: Import data_address
    params:
      file: tests/ccmapi_offer_test.yaml
      export: data_address
      variable: data_address
  - type: import_variable
    name: Import edr_token
    params:
      file: tests/ccmapi_offer_test.yaml
      export: edr_token
      variable: edr_token

steps:
  - type: generate_uuid
    name: Generate Document ID
    store_in_memory:
      document_id: "uuid"

  - type: http_call_dataplane
    name: Send Feedback Message
    params:
      dataplane_url: "@data_address"
      edr_token: "@edr_token"
      method: POST
      path: /feedback
      body:
        header: {}
        content:
          documentId: "@document_id"
          certificateStatus: "ACCEPTED"
          locationBpns:
            - "BPNS000000000001"
    expect:
      - output: status_code
        equals: 200

  - type: load_schema
    name: Load MessageContentAspect Schema
    params:
      name: MessageContentAspect_schema
      source: file
      path: ../schemas/MessageContentAspect-schema.json

  - type: validate_semantic_schema
    name: Validate Feedback Message Structure
    params:
      variable: response_body
      schema_variable: MessageContentAspect_schema
    expect:
      - output: is_valid
        equals: true

variables:
  document_id:
    type: str
