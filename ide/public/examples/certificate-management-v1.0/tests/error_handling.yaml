## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: error-handling
version: "1.0"
dataspace_version: "saturn"
description: >
  Verify CX-0135 error handling: Test 1 sends a request with an unknown
  certificate type expecting REJECTED with proper envelope. Test 2 sends
  a malformed body (missing header) expecting HTTP 500.

services:
  - name: provider_edc
    type: edc_connector_saturn
    config:
      base_url: "@provider_address"
      dma_path: /management

steps:
  # ── Catalog discovery ──────────────────────────────────────────────
  - type: query_catalog_with_filters
    description: Discover CCMAPI offer for error handling test
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
          - operand_left: "https://w3id.org/catenax/ontology/common#version"
            operator: "="
            operand_right: "3.0"
    validate:
      - type: "NOT_NULL"
        output: datasets
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].@id"
        store_in_variable: err_asset_id
        validate:
          - type: "NOT_NULL"
            output: err_asset_id
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].odrl:hasPolicy"
        store_in_variable: err_offer_id
        validate:
          - type: "NOT_NULL"
            output: err_offer_id

  # ── Contract negotiation ───────────────────────────────────────────
  - type: negotiate
    description: Negotiate contract for error handling test
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      offer_id: "@err_offer_id"
      asset_id: "@err_asset_id"
      store_in_variable: err_agreement_id

  # ── Transfer / EDR ─────────────────────────────────────────────────
  - type: initiate_transfer
    description: Get data plane credentials
    params:
      service: provider_edc
      agreement_id: "@err_agreement_id"
      asset_id: "@err_asset_id"
      transfer_type: "HttpData-PULL"

  # ── Test 1: Unknown certificate type → REJECTED ────────────────────
  - type: generate_uuid
    description: Generate message ID for rejected request
    params:
      store_in_variable: err_message_id

  - type: http_call_dataplane
    description: >
      Send request with nonexistent certificate type — SUT must return
      REJECTED with proper CX-0135 header envelope
    params:
      method: POST
      url: "@data_address/companycertificate/request"
      edr_token: "@edr_token"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:@err_message_id"
          context: "CompanyCertificateManagement-CCMAPI-Request:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "@consumer_bpn"
          receiverBpn: "@provider_bpn"
          relatedMessageId: "urn:uuid:@err_message_id"
          version: "3.1.0"
          senderFeedbackUrl: "@testlab_dsp_url"
        content:
          certifiedBpn: "@provider_bpn"
          certificateType: "NONEXISTENT_CERT_TYPE_XYZ"
          locationBpns:
            - "@location_bpns"
    validate:
      - type: "EQUALS"
        output: status_code
        value: 200
      - type: "ASSERT_FIELD"
        output: response_body
        path: "header.messageId"
        operator: "matches_regex"
        value: "^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      - type: "ASSERT_FIELD"
        output: response_body
        path: "header.context"
        operator: "eq"
        value: "CompanyCertificateManagement-CCMAPI-Request:1.0.0"
      - type: "ASSERT_FIELD"
        output: response_body
        path: "header.relatedMessageId"
        operator: "eq"
        value: "urn:uuid:@err_message_id"
      - type: "ASSERT_FIELD"
        output: response_body
        path: "header.version"
        operator: "eq"
        value: "3.1.0"
      - type: "ASSERT_FIELD"
        output: response_body
        path: "header.senderBpn"
        operator: "matches_regex"
        value: "^BPNL[0-9A-Z]{12}$"
      - type: "ASSERT_FIELD"
        output: response_body
        path: "content.requestStatus"
        operator: "eq"
        value: "REJECTED"

  # ── Test 2: Malformed body (missing header) → 500 ──────────────────
  - type: http_call_dataplane
    description: >
      Send malformed request body without header field — SUT must return
      HTTP 500 indicating server-side validation failure
    params:
      method: POST
      url: "@data_address/companycertificate/request"
      edr_token: "@edr_token"
      headers:
        Content-Type: "application/json"
      body:
        content:
          certifiedBpn: "@provider_bpn"
          certificateType: "iso9001"
          locationBpns:
            - "@location_bpns"
    validate:
      - type: "EQUALS"
        output: status_code
        value: 500
