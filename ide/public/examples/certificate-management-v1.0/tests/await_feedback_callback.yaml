## It was reviewed and tested by a human committer.

kind: test
name: await-feedback-callback
version: "1.0"
dataspace_version: "saturn"
description: >
  Listen for provider callback after certificate processing and verify
  CX-0135 header+content envelope on /companycertificate/status.

setup:
  - type: import_variable
    description: Import request ID from request test
    params:
      test: request-certificate
      select: request_id
      store_in_variable: request_id

  - type: mock_endpoint
    description: Expose callback endpoint for provider feedback
    params:
      id: "certificate_feedback_status_callback"
      method: POST
      path: "/companycertificate/status"
      response_status: 200
      response_body:
        accepted: true

steps:
  - type: wait_for_call
    description: Block until provider callback arrives
    params:
      endpoint_id: "certificate_feedback_status_callback"
      timeout_s: 120
    store_in_memory:
      callback_method: "method"
      callback_path: "path"
      callback_payload: "body"
    expect:
      - type: "EQUALS"
        output: method
        value: "POST"
      - type: "EQUALS"
        output: path
        value: "/companycertificate/status"
      - type: "ASSERT_FIELD"
        output: body
        path: "header.relatedMessageId"
        operator: "not_null"
      - type: "ASSERT_FIELD"
        output: body
        path: "content.certificateStatus"
        operator: "not_null"
      - type: "ASSERT_FIELD"
        output: body
        path: "content.documentId"
        operator: "not_null"
      - type: "ASSERT_FIELD"
        output: body
        path: "content.locationBpns"
        operator: "not_null"

  - type: json_path_extract
    description: Extract callback certificate status
    params:
      variable: "callback_payload"
      path: "content.certificateStatus"
      store_in_variable: callback_certificate_status
    expect:
      - type: "NOT_NULL"
        output: value

  - type: json_path_extract
    description: Extract callback document ID
    params:
      variable: "callback_payload"
      path: "content.documentId"
      store_in_variable: callback_document_id
    expect:
      - type: "NOT_NULL"
        output: value

  - type: json_path_extract
    description: Extract related message ID from callback header
    params:
      variable: "callback_payload"
      path: "header.relatedMessageId"
      store_in_variable: callback_related_message_id
    expect:
      - type: "NOT_NULL"
        output: value


