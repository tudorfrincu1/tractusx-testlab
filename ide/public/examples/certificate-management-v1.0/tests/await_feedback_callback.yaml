kind: test
name: await-feedback-callback
version: "1.0"
dataspace_version: "saturn"
description: >
  Listen for provider callback after certificate processing and verify
  feedback payload semantics for CX-0135 path /companycertificate/status.

depends_on:
  - file: tests/request_certificate.yaml
    outputs:
      - request_id

setup:
  - type: mock_endpoint
    description: Expose callback endpoint for provider feedback
    params:
      id: "certificate_feedback_status_callback"
      method: POST
      path: "/companycertificate/status"
      response_status: 200
      response_body:
        accepted: true

steps:
  - type: wait_for_call
    description: Block until provider callback arrives
    params:
      endpoint_id: "certificate_feedback_status_callback"
      timeout_s: 120
    store_in_memory:
      callback_method: "method"
      callback_path: "path"
      callback_payload: "body"
    expect:
      - output: method
        equals: "POST"
      - output: path
        equals: "/companycertificate/status"

  - type: json_path_extract
    description: Extract callback request ID
    params:
      variable: "callback_payload"
      path: "requestId"
    store_in_memory:
      callback_request_id: "value"
    expect:
      - output: value
        equals: "@request_id"

  - type: json_path_extract
    description: Extract callback feedback status
    params:
      variable: "callback_payload"
      path: "feedbackStatus"
    store_in_memory:
      callback_feedback_status: "value"
    expect:
      - output: value
        not_null: true

  - type: json_path_extract
    description: Extract callback feedback message
    params:
      variable: "callback_payload"
      path: "feedbackMessage"
    store_in_memory:
      callback_feedback_message: "value"
    expect:
      - output: value
        not_null: true


