kind: test
name: validate-certificate-payload
version: "1.0"
description: >
  Fetch and validate certificate payload against CX-0135 
  BusinessPartnerCertificate semantic model v3.1.0

inputs:
  - name: provider_address
    type: str
    source: test-case
    description: Provider EDC DSP endpoint
  - name: certificate_type
    type: enum
    values: [iso9001, iatf16949, iso14001, iso45001, iso50001]
    source: test-case
    description: Certificate type to validate
  - name: document_id
    type: str
    source: request_certificate.request_certificate_via_ccmapi.document_id
    description: Document ID from certificate request

prerequisites:
  - test: request_certificate
    strict_order: true
    exports_required:
      - request_id
      - document_id

outputs:
  - name: validation_status
    type: enum
    values: [VALID, INVALID]
    description: Overall certificate validation result
  - name: validation_errors
    type: array[str]
    description: List of validation errors, if any

steps:
  # Step 1: Fetch certificate payload
  - type: http_call
    name: fetch_certificate_payload
    params:
      method: GET
      url: "@provider_address/companycertificate/@document_id"
      headers:
        Accept: "application/json"
    store_in_memory:
      certificate_json: "response_body"
      fetch_status_code: "status_code"

  # Step 2: Validate certificate schema
  - type: validate_semantic_schema
    name: validate_schema
    params:
      variable: "certificate_json"
      semantic_id: "urn:samm:io.catenax.business_partner_certificate:3.1.0#BusinessPartnerCertificate"
    store_in_memory:
      validation_status: "is_valid"
      validation_errors: "validation_errors"

  # Step 3: Validate certificate type matches requested type
  - type: json_path_extract
    name: extract_certificate_type
    params:
      variable: "certificate_json"
      path: "certificateType"
    expect:
      - output: value
        equals: "@certificate_type"

expect:
  - step: fetch_certificate_payload
    output: fetch_status_code
    equals: 200
    description: "Certificate must be accessible via dataplane"

  - step: fetch_certificate_payload
    output: response_body
    not_empty: true
    description: "Certificate JSON must not be empty"

  - step: validate_schema
    output: is_valid
    equals: true
    description: "Certificate must conform to CX-0135 schema"

  - step: extract_certificate_type
    output: value
    equals: "@certificate_type"
    description: "Certificate type must match requested type"

