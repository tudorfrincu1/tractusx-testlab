kind: test
name: validate-certificate-payload
version: "1.0"
dataspace_version: "saturn"
description: >
  Fetch and validate certificate payload against CX-0135
  BusinessPartnerCertificate semantic model v3.1.0.

depends_on:
  - file: tests/request_certificate.yaml
    outputs:
      - document_id

steps:
  - type: http_call
    description: Fetch certificate payload from provider
    params:
      method: GET
      url: "@data_address/companycertificate/@document_id"
      headers:
        Accept: "application/json"
    store_in_memory:
      certificate_json: "response_body"
    expect:
      - output: status_code
        equals: 200
      - output: response_body
        not_empty: true

  - type: validate_semantic_schema
    description: Validate certificate against CX-0135 schema
    params:
      variable: "certificate_json"
      semantic_id: "urn:samm:io.catenax.business_partner_certificate:3.1.0#BusinessPartnerCertificate"
    store_in_memory:
      validation_status: "is_valid"
      validation_errors: "validation_errors"
    expect:
      - output: is_valid
        equals: true

  - type: json_path_extract
    description: Validate certificate type matches requested type
    params:
      variable: "certificate_json"
      path: "certificateType"
    expect:
      - output: value
        equals: "@certificate_type"


