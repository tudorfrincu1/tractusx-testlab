## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: validate-certificate-payload
version: "1.0"
dataspace_version: "saturn"
description: >
  Fetch and validate certificate payload against CX-0135
  BusinessPartnerCertificate semantic model v3.1.0.

setup:
  - type: load_schema
    description: Load BusinessPartnerCertificate v3.1.0 schema
    params:
      name: bpc_schema
      source: file
      path: ../schemas/business_partner_certificate_schema.json
    store_in_memory:
      bpc_schema: "$"

steps:
  - type: http_call
    description: Fetch certificate payload from provider
    params:
      method: GET
      url: "@data_address/companycertificate/@document_id"
      headers:
        Accept: "application/json"
    store_in_memory:
      certificate_json: "response_body"
    expect:
      - type: "EQUALS"
        output: status_code
        value: 200
      - type: "NOT_EMPTY"
        output: response_body
      - type: "SCHEMA_VALIDATION"
        output: response_body
        schema: "@bpc_schema"
      # assert_field: validate a nested field directly on the step output,
      # combining path extraction + assertion in one block.
      # Uses the schema-aware path builder to autocomplete field paths.
      - type: "ASSERT_FIELD"
        output: response_body
        path: "certificateType"
        operator: "equals"
        expected: "@certificate_type"

  - type: json_path_extract
    description: Validate certificate type matches requested type
    params:
      variable: "certificate_json"
      path: "certificateType"
    expect:
      - type: "EQUALS"
        output: value
        value: "@certificate_type"


