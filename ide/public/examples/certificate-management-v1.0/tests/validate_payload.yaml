## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
name: validate-certificate-payload
version: "1.0"
dataspace_version: "saturn"
description: >
  Discover certificate Submodel asset in provider catalog via EDC,
  negotiate + pull via EDR, and validate against CX-0135
  BusinessPartnerCertificate semantic model v3.1.0.

services:
  - name: provider_edc
    type: edc_connector_saturn
    config:
      base_url: "@provider_address"
      dma_path: /management

setup:
  - type: import_variable
    description: Import document ID from request test
    params:
      test: request-certificate
      select: document_id
      store_in_variable: document_id

  - type: load_schema
    description: Load BusinessPartnerCertificate v3.1.0 schema
    params:
      name: bpc_schema
      source: file
      path: ../schemas/business_partner_certificate_schema.json
      store_in_variable: bpc_schema

steps:
  - type: query_catalog_with_filters
    description: Discover certificate Submodel asset in provider catalog
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#Submodel"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificate"
    validate:
      - type: "NOT_NULL"
        output: datasets
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].@id"
        store_in_variable: cert_asset_id
        validate:
          - type: "NOT_NULL"
            output: cert_asset_id
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].odrl:hasPolicy"
        store_in_variable: cert_offer_id
        validate:
          - type: "NOT_NULL"
            output: cert_offer_id
      - type: "json_path_extract"
        output: datasets
        json_path: "[0].properties.['https://admin-shell.io/aas/3/0/HasSemantics/semanticId']"
        store_in_variable: semantic_id_value
        validate:
          - type: "EQUALS"
            output: semantic_id_value
            value: "urn:samm:io.catenax.business_partner_certificate:3.1.0#BusinessPartnerCertificate"

  - type: negotiate
    description: Negotiate contract for certificate asset
    params:
      service: provider_edc
      counter_party_address: "@provider_address"
      offer_id: "@cert_offer_id"
      asset_id: "@cert_asset_id"
      store_in_variable: cert_agreement_id

  - type: initiate_transfer
    description: Get dataplane credentials for certificate
    params:
      service: provider_edc
      agreement_id: "@cert_agreement_id"
      asset_id: "@cert_asset_id"
      transfer_type: "HttpData-PULL"

  - type: http_call_dataplane
    description: Fetch certificate payload via data plane
    params:
      method: GET
      url: "@data_address/companycertificate/@document_id"
      edr_token: "@edr_token"
      headers:
        Accept: "application/json"
    store_in_memory:
      certificate_json: "response_body"
    validate:
      - type: "EQUALS"
        output: status_code
        value: 200
      - type: "NOT_EMPTY"
        output: response_body
      - type: "SCHEMA_VALIDATION"
        output: response_body
        schema: "@bpc_schema"
      - type: "ASSERT_FIELD"
        output: response_body
        path: "certificateType"
        operator: "equals"
        expected: "@certificate_type"
      - type: "json_path_extract"
        output: certificate_json
        json_path: "certificateType"
        store_in_variable: certificate_type_value
        validate:
          - type: "EQUALS"
            output: certificate_type_value
            value: "@certificate_type"


