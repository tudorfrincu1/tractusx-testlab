## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: tck
testlab: v1-alpha

id: certificate-management-tck
namespace: ccm-v0.0.1

metadata:
  name: "Certificate Management TCK"
  version: "v0.0.1"
  description: >
    Validate CCMAPI certificate management workflow per CX-0135 v3.1.0:
    (1) Request certificate from provider
    (2) Validate certificate payload against schema
    (3) Await provider feedback callback
    (4) Send feedback notification and await acknowledgment
    (5) Expose TestLab as provider and verify SUT consumer behavior
  authors:
    - name: Certificate Management Expert Group
  copyright_holders:
    - "2026 Contributors to the Eclipse Foundation"
  license: Apache-2.0
  standards:
    - id: CX-0135
      version: v3.1.0
  tags:
    - CCM
  dataspace_version: saturn

env:
  variables:
    provider_url: ""
    provider_bpn: ""
    consumer_bpn: ""
    certificate_type: "iso9001"
    location_bpns: ""
    testlab_management_url: ""
    testlab_dsp_url: ""
    testlab_mock_base_url: ""
    sut_response_timeout: 300
  services:
    - name: testlab_connector
      uses: service/connector_service
      with:
        base_url: ${{ env.provider_url }}
        management_path: /management/v3
        dsp_path: /api/v1/dsp/2025-1
        dataspace_version: ${{ metadata.dataspace_version }}
        auth:
          type: api_key
          api_key: "test-api-key"
          api_key_header: "X-Api-Key"
      returns:
        service:
          type: class
          class: ConnectorService
  schemas:
    certificate_schema:
      file: business_partner_certificate_schema.json
    bpc_v310_schema:
      file: bpc-v3.1.0.json

preconditions:
  - id: health_testlab_connector
    uses: connector/health_check
    name: TestLab Connector health check
    with:
      connector_service: ${{ env.services.testlab_connector.connector_service }}
      dataspace_version: ${{ metadata.dataspace_version }}
    validate:
      - uses: validate/assert
        with:
          input: status_code
          operator: equals
          value: 200
          
  - id: testlab_connector
    uses: precondition/generate
    name: TestLab Connector Configuration
    returns:
      dsp_url:
        type: string
        class: Url
        generator: testlab_dsp_endpoint
      bpn:
        type: string
        class: Bpn
        generator: testlab_bpn

  - id: ccm_policy
    uses: precondition/provide
    name: Required CCMAPI Usage Policy
    with:
      value:
        permissions:
          - action: use
            constraints:
              and:
                - left_operand: UsagePurpose
                  operator: isAnyOf
                  right_operand: "cx.ccm.base:1"
                - left_operand: FrameworkAgreement
                  operator: eq
                  right_operand: "DataExchangeGovernance:1.0"
    returns:
      policy:
        type: object
        class: Policy

  - id: sut_connector
    uses: precondition/input
    name: SUT Connector Details
    returns:
      counter_party_address:
        type: string
        class: Url
        label: "SUT DSP Endpoint URL"
        placeholder: "https://my-connector.example.com/api/dsp"
      counter_party_id:
        type: string
        class: Bpn
        label: "SUT Business Partner Number"
        placeholder: "BPNL000000000001"

tests:
  - catalog_policy_validation.yaml
  - request_certificate.yaml
  - validate_payload.yaml
  - push_certificate.yaml
  - available_notification.yaml
  - send_feedback.yaml
  - expose_testlab_asset.yaml
  - certificate_asset_validation.yaml
  - error_handling.yaml

