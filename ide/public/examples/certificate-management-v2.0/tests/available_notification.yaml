## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: available-notification
namespace: ccm-v0.0.1

metadata:
  name: "Available Notification"
  version: "1.0"
  description: >
    Test CX-0135 AVAILABLE notification: send availability notification to SUT
    and verify SUT subsequently pulls the certificate from TestLab.

setup:
  - id: mock_cert_pull
    uses: mock/api
    name: Expose mock endpoint for SUT certificate pull request
    with:
      method: GET
      path: "/api/v1/companycertificate/available"
      response_status: 200
      response_body:
        businessPartnerNumber: "${{ env.provider_bpn }}"
        certificateType: "${{ env.certificate_type }}"
        registrationNumber: "CERT-AVAIL-001"
        enclosedSites:
          - enclosedSiteBpn: "${{ env.location_bpns }}"
        validFrom: "2026-01-01"
        validUntil: "2028-12-31"
        trustLevel: "none"
        document:
          documentID: "cert-asset-001"
          creationDate: "2026-01-01T00:00:00Z"
          contentType: "application/pdf"
          contentBase64: "iVBORw0KGgoAAAANSUhEUgA="
        validator:
          validatorName: "TÜV SÜD"
          validatorBpn: "BPNL133631123120"
        type:
          certificateVersion: "2015"
          certificateType: "${{ env.certificate_type }}"
        areaOfApplication: "Quality Management"
        issuer:
          issuerName: "TÜV SÜD"
          issuerBpn: "BPNL133631123120"
    returns:
      mock:
        type: class
        class: MockInstance
      base_mock_url:
        type: string
      full_mock_url:
        type: string

steps:
  - id: pull_notification_endpoint
    uses: edc/pull_data_filtered
    name: Discover CCMAPI notification endpoint and obtain dataplane credentials
    with:
      service: provider
      counter_party_address: ${{ preconditions.sut_connector.counter_party_address }}
      counter_party_id: ${{ preconditions.sut_connector.counter_party_id }}
      policy: ${{ preconditions.ccm_policy.policy }}
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "http://purl.org/dc/terms/subject"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    returns:
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl
    validate:
      - uses: validate/assert
        with: { input: edr_token, operator: not_null }
      - uses: validate/assert
        with: { input: dataplane_url, operator: not_null }

  - id: gen_avail_message_id
    uses: util/generate_uuid
    name: Generate available notification message ID
    returns:
      generated_id:
        type: string
        class: Uuid

  - id: send_available_notification
    uses: http/call_dataplane
    name: Send certificate available notification to SUT
    with:
      method: POST
      dataplane_url: "${{ steps.pull_notification_endpoint.dataplane_url }}"
      path: "/companycertificate/available"
      edr_token: "${{ steps.pull_notification_endpoint.edr_token }}"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:${{ steps.gen_avail_message_id.generated_id }}"
          context: "CompanyCertificateManagement-CCMAPI-Available:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "${{ env.consumer_bpn }}"
          receiverBpn: "${{ env.provider_bpn }}"
          relatedMessageId: "urn:uuid:${{ steps.gen_avail_message_id.generated_id }}"
          version: "3.1.0"
          senderFeedbackUrl: "${{ env.testlab_dsp_url }}"
        content:
          documentId: "cert-asset-001"
          certificateType: "${{ env.certificate_type }}"
          locationBpns:
            - "${{ env.location_bpns }}"
    returns:
      status_code:
        type: integer
        class: StatusCode
    validate:
      - uses: validate/assert
        with: { input: status_code, operator: equals, value: 200 }

  - id: wait_sut_pull
    uses: mock/wait/request
    name: Wait for SUT to pull the certificate from TestLab
    with:
      mock: ${{ setup.mock_cert_pull.mock }}
      timeout_s: "${{ env.sut_response_timeout }}"
    returns:
      request_method:
        type: string
        class: String
      request_headers:
        type: object
        class: ResponseHeaders
      request_body:
        type: object
        class: ResponseBody
      query_params:
        type: object
        class: String
      elapsed_ms:
        type: integer
        class: String
    validate:
      - uses: validate/assert
        with: { input: request_method, operator: equals, value: "GET" }
