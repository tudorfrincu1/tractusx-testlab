## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: push-certificate
namespace: ccm-v0.0.1

metadata:
  name: "Push Certificate"
  version: "1.0"
  description: >
    Test CX-0135 PUSH mechanism: push certificate to SUT and verify SUT sends
    a feedback callback with correct relatedMessageId and valid certificateStatus.

setup:
  - id: mock_feedback_callback
    uses: mock/api
    name: Expose mock endpoint for SUT feedback callback
    with:
      method: POST
      path: "/companycertificate/status"
      response_status: 200
    returns:
      mock:
        type: class
        class: MockInstance
      base_mock_url:
        type: string
      full_mock_url:
        type: string

steps:
  - id: pull_notification_endpoint
    uses: connector/pull_data_filtered
    name: Discover CCMAPI notification endpoint and obtain dataplane credentials
    with:
      counter_party_address: ${{ infrastructure.sut.connector.counter_party_address }}
      counter_party_id: ${{ infrastructure.sut.connector.counter_party_id }}
      policy: ${{ env.ccm_usage_policy.policy }}
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "http://purl.org/dc/terms/subject"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    returns:
      catalog:
        type: object
        class: Catalog
      datasets:
        type: object
        class: Datasets
      asset_id:
        type: string
        class: AssetId
      negotiation_id:
        type: string
        class: NegotiationId
      transfer_process_id:
        type: string
        class: TransferId
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl
    validate:
      - uses: validate/assert
        with: { input: datasets, operator: not_null }
      - uses: validate/assert
        with: { input: asset_id, operator: not_null }
      - uses: validate/assert
        with: { input: negotiation_id, operator: not_null }
      - uses: validate/assert
        with: { input: transfer_process_id, operator: not_null }
      - uses: validate/assert
        with: { input: edr_token, operator: not_null }
      - uses: validate/assert
        with: { input: dataplane_url, operator: not_null }

  - id: gen_push_message_id
    uses: util/generate_uuid
    name: Generate push message ID
    returns:
      generated_id:
        type: string
        class: Uuid

  - id: push_cert_to_sut
    uses: connector/dataplane/http_request
    name: Push certificate to SUT via data plane
    with:
      method: POST
      dataplane_url: "${{ steps.pull_notification_endpoint.dataplane_url }}"
      path: "/companycertificate/push"
      edr_token: "${{ steps.pull_notification_endpoint.edr_token }}"
      headers:
        Content-Type: "application/json"
      body: "${{ testdata.push_certificate_body }}"
    returns:
      status_code:
        type: integer
        class: StatusCode
    validate:
      - uses: validate/assert
        with: { input: status_code, operator: equals, value: 200 }

  - id: wait_feedback_callback
    uses: mock/wait/http_request
    name: Wait for SUT feedback callback with status acknowledgment
    with:
      mock: ${{ setup.mock_feedback_callback.mock }}
      timeout_s: "${{ env.sut_response_timeout }}"
    returns:
      request_method:
        type: string
        class: String
      request_headers:
        type: object
        class: ResponseHeaders
      request_body:
        type: object
        class: ResponseBody
      query_params:
        type: object
        class: String
      elapsed_ms:
        type: integer
        class: String
    validate:
      - uses: validate/assert
        with: { input: request_method, operator: equals, value: "POST" }
      - uses: validate/field
        with:
          input: request_body
          path: "header.messageId"
          operator: matches_regex
          value: "^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      - uses: validate/field
        with:
          input: request_body
          path: "header.context"
          operator: equals
          value: "CompanyCertificateManagement-CCMAPI-Status:1.0.0"
      - uses: validate/field
        with:
          input: request_body
          path: "header.sentDateTime"
          operator: not_null
      - uses: validate/field
        with:
          input: request_body
          path: "header.senderBpn"
          operator: matches_regex
          value: "^BPNL[0-9A-Z]{12}$"
      - uses: validate/field
        with:
          input: request_body
          path: "header.receiverBpn"
          operator: equals
          value: "${{ env.consumer_bpn }}"
      - uses: validate/field
        with:
          input: request_body
          path: "header.relatedMessageId"
          operator: equals
          value: "urn:uuid:${{ steps.gen_push_message_id.generated_id }}"
      - uses: validate/field
        with:
          input: request_body
          path: "header.version"
          operator: equals
          value: "3.1.0"
      - uses: validate/field
        with:
          input: request_body
          path: "content.certificateStatus"
          operator: one_of
          value: ["RECEIVED", "ACCEPTED", "REJECTED"]
      - uses: validate/field
        with:
          input: request_body
          path: "content.documentId"
          operator: equals
          value: "UUID--PUSH-001"
      - uses: validate/field
        with:
          input: request_body
          path: "content.locationBpns"
          operator: not_null
