## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: send-feedback-notification
namespace: ccm-v0.0.1

metadata:
  name: "Send Feedback Notification"
  version: "1.0"
  description: >
    Send a CX-0135 CCMAPI status notification to the provider via EDC dataplane
    and await the provider's acknowledgment on a TestLab mock endpoint.

setup:
  - id: mock_receive_ack
    uses: mock/api
    name: Expose mock endpoint for provider RECEIVE acknowledgment
    with:
      method: POST
      path: "/companycertificate/notification/receive"
      response_status: 200
      response_body: {}
    returns:
      mock:
        type: class
        class: MockInstance
      base_mock_url:
        type: string
      full_mock_url:
        type: string

steps:
  - id: pull_notification_endpoint
    uses: connector/pull_data_filtered
    name: Find CCMAPI endpoint and obtain dataplane credentials
    with:
      counter_party_address: ${{ infrastructure.sut.connector.counter_party_address }}
      counter_party_id: ${{ infrastructure.sut.connector.counter_party_id }}
      policy: ${{ env.ccm_usage_policy.policy }}
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "http://purl.org/dc/terms/subject"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    returns:
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl
    validate:
      - uses: validate/assert
        with: { input: edr_token, operator: not_null }
      - uses: validate/assert
        with: { input: dataplane_url, operator: not_null }

  - id: gen_feedback_uuid
    uses: util/generate_uuid
    name: Generate feedback message ID
    returns:
      generated_id:
        type: string
        class: Uuid

  - id: send_status_notification
    uses: connector/dataplane/http_request
    name: Send CX-0135 status notification to provider via dataplane
    with:
      method: POST
      dataplane_url: "${{ steps.pull_notification_endpoint.dataplane_url }}"
      path: "/companycertificate/status"
      edr_token: "${{ steps.pull_notification_endpoint.edr_token }}"
      headers:
        Content-Type: "application/json"
      body: "${{ testdata.send_feedback_body }}"
    returns:
      status_code:
        type: integer
        class: StatusCode
    validate:
      - uses: validate/assert
        with: { input: status_code, operator: equals, value: 200 }

  - id: wait_provider_ack
    uses: mock/wait/http_request
    name: Wait for provider RECEIVE acknowledgment
    with:
      mock: ${{ setup.mock_receive_ack.mock }}
      timeout_s: 60
    returns:
      request_method:
        type: string
        class: String
      request_headers:
        type: object
        class: ResponseHeaders
      request_body:
        type: object
        class: ResponseBody
      query_params:
        type: object
        class: String
      elapsed_ms:
        type: integer
        class: String
    validate:
      - uses: validate/assert
        with: { input: request_method, operator: equals, value: "POST" }
      - uses: validate/field
        with:
          input: request_body
          path: "header.messageId"
          operator: matches_regex
          value: "^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
      - uses: validate/field
        with:
          input: request_body
          path: "header.context"
          operator: equals
          value: "CompanyCertificateManagement-CCMAPI-Status:1.0.0"
      - uses: validate/field
        with:
          input: request_body
          path: "header.sentDateTime"
          operator: not_null
      - uses: validate/field
        with:
          input: request_body
          path: "header.senderBpn"
          operator: matches_regex
          value: "^BPNL[0-9A-Z]{12}$"
      - uses: validate/field
        with:
          input: request_body
          path: "header.receiverBpn"
          operator: equals
          value: "${{ env.consumer_bpn }}"
      - uses: validate/field
        with:
          input: request_body
          path: "header.version"
          operator: equals
          value: "3.1.0"
      - uses: validate/field
        with:
          input: request_body
          path: "content.certificateStatus"
          operator: one_of
          value: ["RECEIVED", "ACCEPTED", "REJECTED"]
