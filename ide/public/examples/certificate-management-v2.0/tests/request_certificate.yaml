## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: request-certificate
namespace: ccm-v0.0.1

metadata:
  name: "Request Certificate"
  version: "1.0"
  description: >
    Request certificate via CCMAPI endpoint per CX-0135 v3.1.0.
    Validates full 7-field header envelope on response and requestStatus enum.

steps:
  - id: pull_data_1
    uses: edc/pull_data_filtered
    name: Discover CCMAPI offers, negotiate with expected policy, and obtain EDR
    with:
      service: provider
      counter_party_address: ${{ preconditions.sut_connector.counter_party_address }}
      counter_party_id: ${{ preconditions.sut_connector.counter_party_id }}
      policy: ${{ preconditions.ccm_policy.policy }}
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "http://purl.org/dc/terms/subject"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    returns:
      catalog:
        type: object
        class: Catalog
      datasets:
        type: array
        class: Datasets
      asset_id:
        type: string
        class: AssetId
      negotiation_id:
        type: string
        class: NegotiationId
      transfer_process_id:
        type: string
        class: TransferId
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl

  - id: assert_datasets_1
    uses: validate/assert
    name: Datasets must be returned
    with:
      input: "${{ steps.pull_data_1.datasets }}"
      operator: not_null

  - id: assert_asset_id_1
    uses: validate/assert
    name: Asset ID must be returned
    with:
      input: "${{ steps.pull_data_1.asset_id }}"
      operator: not_null

  - id: assert_negotiation_id_1
    uses: validate/assert
    name: Negotiation ID must be returned
    with:
      input: "${{ steps.pull_data_1.negotiation_id }}"
      operator: not_null

  - id: assert_transfer_id_1
    uses: validate/assert
    name: Transfer process ID must be returned
    with:
      input: "${{ steps.pull_data_1.transfer_process_id }}"
      operator: not_null

  - id: assert_edr_token_1
    uses: validate/assert
    name: EDR token must be returned
    with:
      input: "${{ steps.pull_data_1.edr_token }}"
      operator: not_null

  - id: assert_dataplane_url_1
    uses: validate/assert
    name: Dataplane URL must be returned
    with:
      input: "${{ steps.pull_data_1.dataplane_url }}"
      operator: not_null

  - id: gen_uuid_1
    uses: util/generate_uuid
    name: Generate request message ID
    returns:
      request_uuid:
        type: string
        class: Uuid

  - id: http_call_1
    uses: http/call_dataplane
    name: POST certificate request to CCMAPI endpoint via data plane
    with:
      method: POST
      dataplane_url: "${{ steps.pull_data_1.dataplane_url }}"
      path: "/companycertificate/request"
      edr_token: "${{ steps.pull_data_1.edr_token }}"
      headers:
        Content-Type: "application/json"
      body:
        header:
          messageId: "urn:uuid:${{ steps.gen_uuid_1.request_uuid }}"
          context: "CompanyCertificateManagement-CCMAPI-Request:1.0.0"
          sentDateTime: "2026-01-01T00:00:00Z"
          senderBpn: "${{ env.consumer_bpn }}"
          receiverBpn: "${{ env.provider_bpn }}"
          relatedMessageId: "urn:uuid:${{ steps.gen_uuid_1.request_uuid }}"
          version: "3.1.0"
          senderFeedbackUrl: "${{ env.testlab_dsp_url }}"
        content:
          certifiedBpn: "${{ env.provider_bpn }}"
          certificateType: "${{ env.certificate_type }}"
          locationBpns:
            - "${{ env.location_bpns }}"
    returns:
      status_code:
        type: integer
        class: StatusCode
      response_body:
        type: object
        class: ResponseBody

  - id: assert_status_200
    uses: validate/assert
    name: Response status code must be 200
    with:
      input: "${{ steps.http_call_1.status_code }}"
      operator: equals
      value: 200

  - id: assert_message_id
    uses: validate/field
    name: Header messageId must be a valid URN UUID
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "header.messageId"
      operator: matches_regex
      value: "^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

  - id: assert_context
    uses: validate/field
    name: Header context must match request context
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "header.context"
      operator: equals
      value: "CompanyCertificateManagement-CCMAPI-Request:1.0.0"

  - id: assert_sent_datetime
    uses: validate/field
    name: Header sentDateTime must be present
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "header.sentDateTime"
      operator: not_null

  - id: assert_sender_bpn
    uses: validate/field
    name: Header senderBpn must be a valid BPNL
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "header.senderBpn"
      operator: matches_regex
      value: "^BPNL[0-9A-Z]{12}$"

  - id: assert_receiver_bpn
    uses: validate/field
    name: Header receiverBpn must match consumer BPN
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "header.receiverBpn"
      operator: equals
      value: "${{ env.consumer_bpn }}"

  - id: assert_related_msg_id
    uses: validate/field
    name: Header relatedMessageId must match request UUID
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "header.relatedMessageId"
      operator: equals
      value: "urn:uuid:${{ steps.gen_uuid_1.request_uuid }}"

  - id: assert_version
    uses: validate/field
    name: Header version must be 3.1.0
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "header.version"
      operator: equals
      value: "3.1.0"

  - id: assert_request_status
    uses: validate/field
    name: Content requestStatus must be valid enum value
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "content.requestStatus"
      operator: one_of
      value:
        - "IN_PROGRESS"
        - "COMPLETED"
        - "REJECTED"

  - id: assert_document_id
    uses: validate/field
    name: Content documentId must be present
    with:
      input: "${{ steps.http_call_1.response_body }}"
      path: "content.documentId"
      operator: not_null

teardown:
  - id: export_request_id
    uses: util/export_env
    name: Export request ID for downstream tests
    with:
      name: request_id
      value: "${{ steps.http_call_1.response_body.header.relatedMessageId }}"

  - id: export_document_id
    uses: util/export_env
    name: Export document ID for payload validation
    with:
      name: document_id
      value: "${{ steps.http_call_1.response_body.content.documentId }}"

  - id: export_dataplane_url
    uses: util/export_env
    name: Export dataplane URL for downstream tests
    with:
      name: dataplane_url
      value: "${{ steps.pull_data_1.dataplane_url }}"

  - id: export_edr_token
    uses: util/export_env
    name: Export EDR token for downstream tests
    with:
      name: edr_token
      value: "${{ steps.pull_data_1.edr_token }}"
