## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: catalog-policy-validation
namespace: ccm-v0.0.1

metadata:
  name: "Catalog Policy Validation"
  version: "1.0"
  description: >
    Validate CX-0135 catalog requirements: exactly one CCMAPI asset per BPNL
    and mandatory usage policy constraints (UsagePurpose: cx.ccm.base:1,
    FrameworkAgreement: DataExchangeGovernance:1.0).

steps:
  - id: pull_data_1
    uses: connector/pull_data_filtered
    name: Query catalog for CCMAPI assets and validate policy matches expected constraints
    with:
      counter_party_address: ${{ infrastructure.sut.connector.counter_party_address }}
      counter_party_id: ${{ infrastructure.sut.connector.counter_party_id }}
      policy: ${{ env.ccm_usage_policy.policy }}
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
        - operand_left: "http://purl.org/dc/terms/subject"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificateManagementNotificationApi"
        - operand_left: "https://w3id.org/catenax/ontology/common#version"
          operator: "="
          operand_right: "3.0"
    returns:
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl

  - id: assert_edr_token_1
    uses: validate/assert
    name: EDR authorization token must be obtained
    with:
      input: "${{ steps.pull_data_1.edr_token }}"
      operator: not_null

  - id: assert_dataplane_url_1
    uses: validate/assert
    name: Dataplane URL must be returned
    with:
      input: "${{ steps.pull_data_1.dataplane_url }}"
      operator: not_null
