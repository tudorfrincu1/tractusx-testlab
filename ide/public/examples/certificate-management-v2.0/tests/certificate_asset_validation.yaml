## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: certificate-asset-validation
namespace: ccm-v0.0.1

metadata:
  name: "Certificate Asset Validation"
  version: "1.0"
  description: >
    Validate that certificate Submodel assets in the provider catalog have
    the required CX-0135 properties: aas:semanticId, dct:certificateType,
    and dct:enclosedSites.

steps:
  - id: query_cert_submodel_assets
    uses: edc/query_catalog
    name: Query provider catalog for certificate Submodel assets
    with:
      service: provider
      counter_party_address: ${{ preconditions.sut_connector.counter_party_address }}
      counter_party_id: ${{ preconditions.sut_connector.counter_party_id }}
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#Submodel"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificate"
    returns:
      datasets:
        type: object
        class: Datasets
    validate:
      - uses: validate/assert
        with: { input: "${{ steps.query_cert_submodel_assets.datasets }}", operator: not_null }
      - uses: validate/field
        with:
          input: "${{ steps.query_cert_submodel_assets.datasets }}"
          path: "[0]"
          operator: not_null

  - id: query_with_semantic_id
    uses: edc/query_catalog
    name: Validate aas:semanticId property on certificate asset
    with:
      service: provider
      counter_party_address: ${{ preconditions.sut_connector.counter_party_address }}
      counter_party_id: ${{ preconditions.sut_connector.counter_party_id }}
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#Submodel"
          - operand_left: "http://purl.org/dc/terms/subject"
            operator: "="
            operand_right: "https://w3id.org/catenax/taxonomy#CompanyCertificate"
          - operand_left: "https://admin-shell.io/aas/3/0/HasSemantics/semanticId"
            operator: "="
            operand_right: "urn:samm:io.catenax.business_partner_certificate:3.1.0#BusinessPartnerCertificate"
    returns:
      datasets:
        type: object
        class: Datasets
    validate:
      - uses: validate/assert
        with: { input: "${{ steps.query_with_semantic_id.datasets }}", operator: not_null }
      - uses: validate/field
        with:
          input: "${{ steps.query_with_semantic_id.datasets }}"
          path: "[0].dct:certificateType"
          operator: not_null
      - uses: validate/field
        with:
          input: "${{ steps.query_with_semantic_id.datasets }}"
          path: "[0].dct:enclosedSites"
          operator: not_null
