## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.8).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: certificate-asset-validation
namespace: ccm-v0.0.1

metadata:
  name: "Certificate Asset Validation"
  version: "1.0"
  description: >
    Verify the SUT publishes exactly one CCMAPI certificate asset in its EDC
    catalog and that the offered usage policy matches the CX-0135 v3.1.0
    requirements (UsagePurpose: cx.ccm.base:1, FrameworkAgreement:
    DataExchangeGovernance:1.0) before any data exchange is attempted.

setup:
  - id: ccm_policy
    uses: precondition/provide
    name: Required CCMAPI Usage Policy
    with:
      value:
        permissions:
          - action: use
            constraints:
              and:
                - left_operand: UsagePurpose
                  operator: isAnyOf
                  right_operand: "cx.ccm.base:1"
                - left_operand: FrameworkAgreement
                  operator: eq
                  right_operand: "DataExchangeGovernance:1.0"
    returns:
      policy:
        type: object
        class: Policy

steps:
  - id: pull_data_1
    uses: connector/pull_data_filtered
    name: Discover the CCMAPI certificate asset and obtain dataplane credentials
    with:
      connector_service: ${{ infrastructure.engine.connector }}
      counter_party_address: ${{ infrastructure.sut.connector.counter_party_address }}
      counter_party_id: ${{ infrastructure.sut.connector.counter_party_id }}
      policy: ${{ setup.ccm_policy.policy }}
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "="
          operand_right: "https://w3id.org/catenax/taxonomy#CCMAPI"
    returns:
      edr_token:
        type: string
        class: AuthToken
      dataplane_url:
        type: string
        class: DataplaneUrl

  - id: assert_edr_token_1
    uses: validate/assert
    name: EDR token must be obtained for the certificate asset
    with:
      input: "${{ steps.pull_data_1.edr_token }}"
      operator: not_null

  - id: assert_dataplane_url_1
    uses: validate/assert
    name: Dataplane URL must be returned for the certificate asset
    with:
      input: "${{ steps.pull_data_1.dataplane_url }}"
      operator: not_null
