# Discovery + Exchange Test Case
# Groups multiple tests into a conformity suite: discover connectors, then exchange data.

kind: test-case
name: discovery-exchange-suite
version: "1.0"
description: Test case that validates connector discovery followed by a full data exchange.

variables:
  provider_bpn:
    type: string
    default: BPNL00000003CRHK
    description: BPN of the data provider

tests:
  - kind: test
    name: discover-provider
    version: "1.0"
    description: Find the provider connector endpoint via BPN discovery.
    steps:
      - type: mock_service
        name: Start Mock BPN Discovery
        params:
          type: bpn_discovery
        store_in_memory:
          discovery_url: "$.mock_url"
        expect:
          - type: STATUS_CODE
            value: 200
            severity: HARD

      - type: find_connector
        name: Discover Provider Connector
        params:
          discovery_url: "{{discovery_url}}"
          bpn: "{{provider_bpn}}"
        store_in_memory:
          provider_endpoint: "$.connectorEndpoint"
        expect:
          - type: STATUS_CODE
            value: 200
            severity: HARD

  - kind: test
    name: exchange-data
    version: "1.0"
    description: Create an asset and fetch it through the discovered provider.
    steps:
      - type: create_asset
        name: Create Test Asset
        params:
          id: "{{auto}}"
          name: TestPartData
          description: Sample part data for discovery suite
          base_url: https://data.example.com/parts
        store_in_memory:
          asset_id: "$.id"
        expect:
          - type: STATUS_CODE
            value: 200
            severity: HARD

      - type: query_catalog
        name: Query Catalog
        params:
          provider_url: "{{provider_endpoint}}"
        expect:
          - type: STATUS_CODE
            value: 200
            severity: HARD
          - type: CONTAINS
            path: "dcat:dataset[*].@id"
            value: "{{asset_id}}"
            severity: SOFT
