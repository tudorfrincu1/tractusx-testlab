kind: test-case
name: traceability-notification
version: "1.0"
description: Validate traceability notification flows — receive and update quality investigations and alerts.

standards:
  - id: CX-0125

variables:
  counter_party_address:
    type: str
    description: DSP endpoint of the counter-party connector
  counter_party_id:
    type: str
    description: BPN of the counter-party
  sender_bpn:
    type: str
    description: BPN of the sending party (testbed)

tests:
  - test: tests/receive_quality_investigation.yaml
    description: Negotiate RECEIVE notification asset and send quality investigation
  - test: tests/receive_quality_alert.yaml
    description: Negotiate RECEIVE notification asset and send quality alert
  - test: tests/update_quality_investigation.yaml
    description: Negotiate UPDATE notification asset and send investigation update
  - test: tests/update_quality_alert.yaml
    description: Negotiate UPDATE notification asset and send alert update
