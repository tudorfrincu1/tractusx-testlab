kind: test
name: receive-quality-investigation
version: "1.0"
description: Negotiate a RECEIVE notification asset and send a quality investigation notification.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

steps:
  - template: catalog-negotiation
    params:
      counter_party_address: "@counter_party_address"
      counter_party_id: "@counter_party_id"
      asset_type_filter: "%https://w3id.org/catenax/taxonomy#ReceiveQualityInvestigationNotification%"

  - template: transfer-dataplane-access
    params:
      contract_agreement_id: "@contract_agreement_id"

  - type: generate_uuid
    name: Generate Notification ID
    store_in_memory:
      notification_id: "uuid"

  - type: send_notification
    name: Send Quality Investigation
    params:
      dataplane_url: "@data_address"
      edr_token: "@edr_token"
      notification_type: quality-investigation
      notification_id: "@notification_id"
      sender_bpn: "@sender_bpn"
      recipient_bpn: "@counter_party_id"
      classification: "QM-Investigation"
      severity: "MINOR"
      status: "CREATED"
      type: "RECEIVE"
      content:
        listOfAffectedItems: []
    expect:
      - type: "EQUALS"
        output: status_code
        value: 204

variables:
  notification_id:
    type: str
