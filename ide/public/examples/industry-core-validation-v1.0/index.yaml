kind: test-case
name: industry-core-validation
version: "1.0"
description: Validate Industry Core compliance — shell descriptors and submodel access.

standards:
  - id: CX-0002

variables:
  counter_party_address:
    type: str
    description: DSP endpoint of the counter-party connector
  counter_party_id:
    type: str
    description: BPN of the counter-party
  semantic_id:
    type: str
    default: ""
    description: Optional semantic ID filter for submodel validation

tests:
  - test: tests/shell_descriptors_test.yaml
    description: Verify DTR contains valid shell descriptors
  - test: tests/submodel_test.yaml
    description: Fetch and validate a submodel against its semantic schema
    with:
      semantic_id: "@semantic_id"
