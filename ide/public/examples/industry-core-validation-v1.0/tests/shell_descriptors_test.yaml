kind: test
name: shell-descriptors-test
version: "1.0"
description: Negotiate DTR access and verify shell descriptors are present and non-empty.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

steps:
  - template: catalog-negotiation
    params:
      counter_party_address: "@counter_party_address"
      counter_party_id: "@counter_party_id"
      asset_type_filter: "%https://w3id.org/catenax/taxonomy#DigitalTwinRegistry%"

  - template: transfer-dataplane-access
    params:
      contract_agreement_id: "@contract_agreement_id"

  - template: dtr-shell-lookup
    params:
      data_address: "@data_address"
      edr_token: "@edr_token"

  - type: load_schema
    name: Load Shell Descriptors Schema
    params:
      name: shell_descriptors_schema
      source: file
      path: ../schemas/shell_descriptors_jsonschema.json

  - type: validate_semantic_schema
    name: Validate Shell Descriptors Structure
    params:
      variable: shell_descriptors
      schema_variable: shell_descriptors_schema
    expect:
      - output: is_valid
        equals: true

  - type: json_path_extract
    name: Validate Shell Descriptors Present
    params:
      variable: shell_descriptors
      path: "result"
    store_in_memory:
      shell_list: "value"
    expect:
      - output: value
        not_empty: true

teardown:
  - type: export_variable
    name: Export data_address
    params:
      name: data_address
      value: "@data_address"
  - type: export_variable
    name: Export edr_token
    params:
      name: edr_token
      value: "@edr_token"
  - type: export_variable
    name: Export shell_descriptors
    params:
      name: shell_descriptors
      value: "@shell_descriptors"

variables:
  shell_list:
    type: str
