kind: test
name: submodel-test
version: "1.0"
description: Extract first shell descriptor and validate against the spec schema.

setup:
  - type: import_variable
    name: Import shell_descriptors
    params:
      file: tests/shell_descriptors_test.yaml
      export: shell_descriptors
      variable: shell_descriptors

steps:
  - type: json_path_extract
    name: Extract First Shell Descriptor
    params:
      variable: shell_descriptors
      path: "result[0]"
    store_in_memory:
      first_descriptor: "value"
    expect:
      - type: "NOT_EMPTY"
        output: value

  - type: load_schema
    name: Load Shell Descriptor Spec Schema
    params:
      name: shell_descriptor_spec_schema
      source: file
      path: ../schemas/shell_descriptors_spec_jsonschema.json

  - type: validate_semantic_schema
    name: Validate Descriptor Against Spec
    params:
      variable: first_descriptor
      schema_variable: shell_descriptor_spec_schema
    expect:
      - type: "EQUALS"
        output: is_valid
        value: true

variables:
  first_descriptor:
    type: str
