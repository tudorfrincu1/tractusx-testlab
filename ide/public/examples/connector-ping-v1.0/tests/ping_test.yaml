## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.6).
## It was reviewed and tested by a human committer.

kind: test
testlab: v1-alpha

id: connector-ping
namespace: connector-v1.0

metadata:
  name: "Ping Test"
  version: "1.0"
  description: >
    Simple catalog query to verify connector is alive and responding.

setup:
  - id: access_policy
    uses: precondition/provide
    name: SUT Connector Access Policy
    description: >
      Access policy configured for the SUT connector: only the SUT's own BPN
      may obtain the catalog offer (Catena-X BusinessPartnerNumber constraint).
      The value is the full Saturn (Catena-X 2025/9) ODRL PolicyDefinition as
      sent to the EDC Management API; the 2025/9 context JSON-LD carries the
      profile, so no separate profile key is required.
    with:
      value:
        "@context":
          - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
          - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
          - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
        "@type": PolicyDefinition
        "@id": access_policy
        policy:
          "@type": Set
          permission:
            - action: access
              constraint:
                - leftOperand: BusinessPartnerNumber
                  operator: eq
                  rightOperand: "${{ infrastructure.sut.connector.counter_party_id }}"
          prohibition: []
          obligation: []
    returns:
      policy:
        type: object
        class: Policy
      policy_request:
        type: object
        class: PolicyDefinition

  - id: usage_policy
    uses: precondition/provide
    name: SUT Connector Usage Policy
    description: >
      Usage policy the SUT connector must enforce on its offers: a signed
      framework agreement and active dataspace membership. The value is the
      full Saturn (Catena-X 2025/9) ODRL PolicyDefinition as sent to the EDC
      Management API; the 2025/9 context JSON-LD carries the profile.
    with:
      value:
        "@context":
          - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
          - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
          - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
        "@type": PolicyDefinition
        "@id": usage_policy
        policy:
          "@type": Set
          permission:
            - action: use
              constraint:
                - and:
                    - leftOperand: FrameworkAgreement
                      operator: eq
                      rightOperand: "DataExchangeGovernance:1.0"
                    - leftOperand: Membership
                      operator: eq
                      rightOperand: "active"
          prohibition: []
          obligation: []
    returns:
      policy:
        type: object
        class: Policy
      policy_request:
        type: object
        class: PolicyDefinition

steps:
  - id: ping_catalog
    uses: connector/consumer/query_catalog
    name: Ping Catalog
    with:
      connector_service: "${{ infrastructure.engine.connector }}"
      counter_party_address: "${{ env.counter_party_address }}"
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "like"
          operand_right: "%"
    returns:
      status_code:
        type: integer
        class: StatusCode
      datasets:
        type: array
        class: CatalogDatasets
    validate:
      - uses: validate/assert
        with: { input: status_code, operator: equals, value: 200 }
      - uses: validate/assert
        with: { input: datasets, operator: not_null }

  - id: assert_access_policy
    uses: validate/assert
    name: SUT access policy must be configured
    with:
      input: "${{ setup.access_policy.policy }}"
      operator: not_null

  - id: assert_usage_policy
    uses: validate/assert
    name: SUT usage policy must be configured
    with:
      input: "${{ setup.usage_policy.policy }}"
      operator: not_null
