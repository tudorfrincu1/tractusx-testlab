kind: test
testlab: v1-alpha

id: connector-ping
namespace: connector-v1.0

metadata:
  name: "Ping Test"
  version: "1.0"
  description: >
    Simple catalog query to verify connector is alive and responding.

steps:
  - id: ping_catalog
    uses: connector/consumer/query_catalog
    name: Ping Catalog
    with:
      connector_service: "${{ env.services.testlab_connector.connector_service }}"
      counter_party_address: "${{ env.counter_party_address }}"
      filters:
        - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
          operator: "like"
          operand_right: "%"
    returns:
      status_code:
        type: integer
        class: StatusCode
      datasets:
        type: array
        class: CatalogDatasets
    validate:
      - uses: validate/assert
        with: { input: status_code, operator: equals, value: 200 }
      - uses: validate/assert
        with: { input: datasets, operator: not_null }
