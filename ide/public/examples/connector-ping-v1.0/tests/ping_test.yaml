kind: test
name: ping-test
version: "1.0"
description: Simple catalog query to verify connector is alive and responding.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

steps:
  - type: query_catalog
    name: Ping Catalog
    params:
      service: testbed
      counter_party_address: "@counter_party_address"
      filter:
        filter_expression:
          - operand_left: "https://w3id.org/edc/v0.0.1/ns/type"
            operator: "like"
            operand_right: "%"
    store_in_memory:
      catalog_datasets: "datasets"
    expect:
      - type: "EQUALS"
        output: status_code
        value: 200
      - type: "NOT_NULL"
        output: datasets

variables:
  catalog_datasets:
    type: str
