kind: tck
name: connector-ping
version: "1.0"
description: Verify that the counter-party connector is reachable and responds to catalog queries.

variables:
  counter_party_address:
    type: str
    description: DSP endpoint of the counter-party connector
  counter_party_id:
    type: str
    description: BPN of the counter-party

tests:
  - test: tests/ping_test.yaml
    description: Query catalog and verify HTTP 200 response
