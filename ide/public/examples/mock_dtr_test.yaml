# Mock DTR Test
# Register and look up a digital twin using a simulated DTR service.

kind: test
name: mock-dtr-test
version: "1.0"
dataspace_version: saturn
description: Test twin registration and lookup against a mock Digital Twin Registry.

steps:
  - type: mock_service
    name: Start Mock DTR
    params:
      type: dtr
    store_in_memory:
      dtr_url: "$.mock_url"
    expect:
      - type: STATUS_CODE
        value: 200
        severity: HARD

  - type: mock_endpoint
    name: Configure Twin Registration
    params:
      method: POST
      path: /shell-descriptors
      status: "201"
      body:
        id: "urn:uuid:test-twin-001"
        idShort: TestTwin

  - type: register_twin
    name: Register Digital Twin
    params:
      dtr_url: "{{dtr_url}}"
      id_short: TestTwin
      specific_asset_ids:
        manufacturerPartId: MPI-001
    store_in_memory:
      twin_id: "$.id"
    expect:
      - type: STATUS_CODE
        value: 201
        severity: HARD

  - type: lookup_twin
    name: Look Up Twin by Asset ID
    params:
      dtr_url: "{{dtr_url}}"
      asset_id_name: manufacturerPartId
      asset_id_value: MPI-001
    expect:
      - type: STATUS_CODE
        value: 200
        severity: HARD
      - type: CONTAINS
        path: "$.result"
        value: "urn:uuid:test-twin-001"
        severity: HARD
