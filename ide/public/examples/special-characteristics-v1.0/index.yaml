kind: test-case
name: special-characteristics
version: "1.0"
description: Validate special characteristics notification and data transfer flows.

variables:
  counter_party_address:
    type: str
    description: DSP endpoint of the counter-party connector
  counter_party_id:
    type: str
    description: BPN of the counter-party
  sender_bpn:
    type: str
    description: BPN of the sending party (testbed)

tests:
  - test: tests/notification_validation.yaml
    description: Validate notification payload structure
  - test: tests/data_transfer.yaml
    description: Transfer special characteristics data and verify twin availability
  - test: tests/schema_validation.yaml
    description: Validate full data flow against semantic schema
