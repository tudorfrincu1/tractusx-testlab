## This code was partially generated using artificial intelligence (AI) (Tool: Copilot, Model: Claude Opus 4.8).
## It was reviewed and tested by a human committer.

kind: tck
name: dtr-ping
version: "1.0"
description: Verify Digital Twin Registry is accessible via the counter-party connector dataplane.

dataspace:
  ecosystem: Catena-X
  version: saturn

infrastructure:
  engine:
    connector:
      required: true
  sut:
    connector:
      required: true
    dtr:
      required: true

variables:
  - id: counter_party_address
    uses: variable/type/string
    description: DSP endpoint of the counter-party connector
    with:
      source: input
    returns:
      value:
        type: string
  - id: counter_party_id
    uses: variable/type/string
    description: BPN of the counter-party
    with:
      source: input
    returns:
      value:
        type: string
  - id: access_policy
    uses: config/connector/policy
    name: SUT Connector Access Policy
    description: >
      Access policy configured for the SUT connector: only the SUT's own BPN
      may obtain the DTR catalog offer (BusinessPartnerNumber constraint).
    with:
      value:
        permissions:
          - action: access
            constraints:
              and:
                - left_operand: BusinessPartnerNumber
                  operator: eq
                  right_operand: "${{ infrastructure.sut.connector.counter_party_id }}"
    returns:
      policy:
        type: object
        class: Policy
  - id: usage_policy
    uses: config/connector/policy
    name: SUT Connector Usage Policy
    description: >
      Usage policy the SUT connector must enforce on its DTR offer: a signed
      framework agreement and active dataspace membership.
    with:
      value:
        permissions:
          - action: use
            constraints:
              and:
                - left_operand: FrameworkAgreement
                  operator: eq
                  right_operand: "DataExchangeGovernance:1.0"
                - left_operand: Membership
                  operator: eq
                  right_operand: "active"
    returns:
      policy:
        type: object
        class: Policy

tests:
  - test: tests/dtr_access_test.yaml
    description: Negotiate DTR access and query shell-descriptors endpoint
