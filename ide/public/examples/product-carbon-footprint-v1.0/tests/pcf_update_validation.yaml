kind: test
name: pcf-update-validation
version: "1.0"
description: Validate received PCF data against the PCF v9.0.0 semantic schema.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

setup:
  - type: import_variable
    name: Import pcf_data
    params:
      file: tests/pcf_offer_fetch.yaml
      export: pcf_data
      variable: pcf_data

steps:
  - type: load_schema
    name: Load PCF v9 Schema
    params:
      name: pcf_v9_schema
      source: file
      path: ../schemas/Pcf-schema.json

  - type: validate_semantic_schema
    name: Validate PCF Data
    params:
      variable: pcf_data
      schema_variable: pcf_v9_schema
      semantic_id: "urn:samm:io.catenax.pcf:9.0.0#Pcf"
    expect:
      - output: is_valid
        equals: true

  - type: json_path_extract
    name: Verify Scope of PCF Form
    params:
      variable: pcf_data
      path: "scopeOfPcfForm"
    expect:
      - output: value
        not_null: true

  - type: json_path_extract
    name: Verify Company and Product Information
    params:
      variable: pcf_data
      path: "companyAndProductInformation"
    expect:
      - output: value
        not_null: true
