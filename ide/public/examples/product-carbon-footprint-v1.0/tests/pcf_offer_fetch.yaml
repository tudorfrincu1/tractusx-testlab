kind: test
name: pcf-offer-fetch
version: "1.0"
description: Discover PCF submodel via DTR lookup and fetch PCF data.

services:
  - name: testbed
    type: edc_connector_saturn
    config:
      management_url: "@counter_party_address"

steps:
  - template: catalog-negotiation
    params:
      counter_party_address: "@counter_party_address"
      counter_party_id: "@counter_party_id"
      asset_type_filter: "%https://w3id.org/catenax/taxonomy#DigitalTwinRegistry%"

  - template: transfer-dataplane-access
    params:
      contract_agreement_id: "@contract_agreement_id"

  - template: dtr-shell-lookup
    params:
      data_address: "@data_address"
      edr_token: "@edr_token"

  - type: json_path_extract
    name: Find PCF Submodel
    params:
      variable: shell_descriptors
      path: "result[*].submodelDescriptors[?(@.semanticId.keys[0].value=='urn:samm:io.catenax.pcf:9.0.0#Pcf')].endpoints[0].protocolInformation.href"
    store_in_memory:
      pcf_submodel_url: "value"

  - type: http_call_dataplane
    name: Fetch PCF Data
    params:
      dataplane_url: "@pcf_submodel_url"
      edr_token: "@edr_token"
      method: GET
    store_in_memory:
      pcf_data: "response_body"
    expect:
      - type: "EQUALS"
        output: status_code
        value: 200
      - type: "NOT_EMPTY"
        output: response_body

teardown:
  - type: export_variable
    name: Export pcf_data
    params:
      name: pcf_data
      value: "@pcf_data"

variables:
  pcf_submodel_url:
    type: str
  pcf_data:
    type: str
