kind: tck
name: product-carbon-footprint
version: "1.0"
description: Validate PCF data exchange — offer discovery, data fetch, and schema validation.

standards:
  - id: CX-0136

variables:
  counter_party_address:
    type: str
    description: DSP endpoint of the counter-party connector
  counter_party_id:
    type: str
    description: BPN of the counter-party
  manufacturer_part_id:
    type: str
    default: ""
    description: Optional manufacturer part ID for DTR lookup

tests:
  - test: tests/pcf_offer_fetch.yaml
    description: Discover PCF submodel via DTR and fetch data
  - test: tests/pcf_update_validation.yaml
    description: Receive PCF payload and validate against PCF v8 schema
