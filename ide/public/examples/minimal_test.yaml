# Minimal Test
# The simplest possible test — a single HTTP request with a status check.

kind: test
name: minimal-test
version: "1.0"
description: A minimal test that makes one HTTP request and checks the status code.

steps:
  - type: http_request
    name: Health Check
    params:
      method: GET
      url: https://httpbin.org/status/200
    expect:
      - type: STATUS_CODE
        value: 200
        severity: HARD
