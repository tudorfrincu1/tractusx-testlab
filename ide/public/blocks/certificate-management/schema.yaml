apiVersion: v1
kind: schema
category: Certificate Management
description: >
  Block definitions for CCMAPI certificate management per CX-0135.
  Includes request, validation, and feedback capabilities.

# Variable types available in this category
variable_types:
  - name: provider_address
    type: str
    description: EDC DSP endpoint URL of certificate provider
    pattern: "^https?://"
    ui_hint: text_input
    
  - name: provider_bpn
    type: str
    description: Provider's BPNL (Business Partner Number - Legal Entity)
    pattern: "^BPNL[0-9A-Z]{8}[0-9A-Z]{4}$"
    ui_hint: text_input
    help: "Format: BPNL followed by 12 alphanumeric characters"
    
  - name: consumer_bpn
    type: str
    description: Consumer's BPNL (your company)
    pattern: "^BPNL[0-9A-Z]{8}[0-9A-Z]{4}$"
    ui_hint: text_input
    
  - name: certificate_type
    type: enum
    values: 
      - iso9001      # Quality management
      - iatf16949    # Automotive quality
      - iso14001     # Environmental management
      - iso45001     # Occupational health and safety
      - iso50001     # Energy management
    description: Certificate type code per CX-0135
    ui_hint: dropdown
    
  - name: location_bpns
    type: array[str]
    description: Array of BPNS (Business Partner Number - Site)
    item_pattern: "^BPNS[0-9A-Z]{6}$"
    ui_hint: multi_input
    help: "Each location: BPNS followed by 10 characters"

# Service types this category needs
service_types:
  - name: edc_connector
    type: edc_connector_saturn
    description: EDC connector for dataspace operations
    configurable_fields:
      - name: management_url
        type: str
        description: EDC management API endpoint
        required: true
        pattern: "^https?://"
        ui_hint: text_input
        
      - name: timeout_seconds
        type: int
        description: Request timeout in seconds
        required: false
        default: 60
        min: 1
        max: 300
        ui_hint: number_input

# Step / Block types this category defines
block_types:
  - name: request_certificate
    display_name: "Request Certificate"
    description: Request certificate from provider via CCMAPI
    category: Certificate Management
    
    configurable_inputs:
      - name: certificate_type
        type: enum
        values: [iso9001, iatf16949, iso14001, iso45001, iso50001]
        description: Certificate type to request
        required: true
        ui_hint: dropdown
        
      - name: location_bpns
        type: array[str]
        description: BPN sites needing certificate
        required: true
        min_items: 1
        ui_hint: multi_input
        
      - name: request_timeout_seconds
        type: int
        description: Request timeout
        required: false
        default: 60
        ui_hint: number_input
    
    outputs:
      - name: request_id
        type: str
        description: Unique request ID (UUID)
        
      - name: request_status
        type: enum
        values: [IN_PROGRESS, COMPLETED, REJECTED]
        description: Current request status
        
      - name: document_id
        type: str
        description: EDC asset ID of certificate (if COMPLETED)
        
      - name: error_details
        type: array[str]
        description: Error list (if REJECTED)

  - name: validate_certificate_payload
    display_name: "Validate Certificate"
    description: Validate certificate against CX-0135 schema
    
    configurable_inputs:
      - name: strictness
        type: enum
        values: [relaxed, standard, strict]
        description: Validation strictness level
        required: false
        default: standard
        ui_hint: dropdown
        
      - name: allowed_issuer_bpns
        type: array[str]
        description: Whitelist of trusted issuers (optional)
        required: false
        ui_hint: multi_input
    
    outputs:
      - name: validation_status
        type: enum
        values: [VALID, INVALID]
        description: Schema validation result
        
      - name: validation_errors
        type: array[object]
        description: "Array of errors: {field, message, severity}"
        
      - name: validated_cert_id
        type: str
        description: Validated certificate ID

  - name: send_certificate_feedback
    display_name: "Send Feedback"
    description: Send feedback (ACCEPTED/REJECTED) to provider
    
    configurable_inputs:
      - name: feedback_type_override
        type: enum
        values: [ACCEPTED, REJECTED, RECEIVED]
        description: Force specific feedback type (auto-determined if not set)
        required: false
        ui_hint: dropdown
        
      - name: include_error_details
        type: bool
        description: Include validation errors in feedback (if rejected)
        required: false
        default: true
        ui_hint: checkbox
    
    outputs:
      - name: feedback_id
        type: str
        description: Feedback message ID
        
      - name: feedback_status
        type: enum
        values: [SENT, DELIVERY_FAILED, TIMEOUT]
        description: Feedback delivery status
        
      - name: provider_response_code
        type: int
        description: HTTP status code from provider

# Validation rules for assertions
validation_operators:
  - name: equals
    applies_to: [str, int, bool, enum]
    description: Output equals expected value
    example: "status equals COMPLETED"
    
  - name: in_list
    applies_to: [enum, str]
    description: Output is one of allowed values
    example: "status in_list [COMPLETED, IN_PROGRESS]"
    
  - name: contains
    applies_to: [str, array]
    description: String contains substring / array contains item
    example: "errors contains SCHEMA_INVALID"
    
  - name: matches
    applies_to: [str]
    description: String matches regex pattern
    example: "request_id matches ^[a-f0-9\\-]{36}$"
    
  - name: not_null
    applies_to: [all]
    description: Output is not null/empty
    example: "document_id not_null"
    
  - name: is_valid_uuid
    applies_to: [str]
    description: String is valid UUID format
    example: "request_id is_valid_uuid"
    
  - name: array_not_empty
    applies_to: [array]
    description: Array has at least one item
    example: "errors array_not_empty"
    
  - name: gt
    applies_to: [int, float]
    description: Greater than
    example: "response_code gt 199"

