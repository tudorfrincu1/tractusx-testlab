replicaCount: 1

image:
  repository: ghcr.io/eclipse-tractusx/ccm-sut-stub
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8090

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ccm-sut-stub.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Stub configuration — maps to environment variables
config:
  # Port the stub listens on
  port: 8090
  # TestLab mock server URL (where the stub sends callbacks)
  testlabMockBaseUrl: "http://testlab-backend:8100"
  # Provider BPN (the stub's identity)
  providerBpn: "BPNL000000000001"
  # Consumer BPN (TestLab's identity)
  consumerBpn: "BPNL000000000002"
  # Delay in seconds before sending async callbacks
  callbackDelaySeconds: 10

# Liveness and readiness probes
probes:
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 3
    periodSeconds: 5

serviceAccount:
  create: false
  name: ""

podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}
