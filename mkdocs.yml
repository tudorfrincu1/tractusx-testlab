site_name: Tractus-X TestLab Documentation
site_description: Visual test authoring tool for Eclipse Tractus-X dataspaces
repo_url: https://github.com/eclipse-tractusx/tractusx-testlab
repo_name: eclipse-tractusx/tractusx-testlab
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  favicon: assets/images/logo_tractus-x-min.ico
  logo: assets/images/logo_tractus-x.svg
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: custom
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google

extra:
  version:
    provider: mike

extra_css:
  - assets/stylesheets/orange-black-theme.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      use_pygments: true
      pygments_style: monokai
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.caret

nav:
  - Home:
    - Welcome: index.md
    - Overview: home/overview.md
  - IDE:
    - Getting Started: ide/index.md
  - Specification:
    - YAML Format: specification/index.md
  - Tutorials:
    - First Test: tutorials/index.md
  - API Reference:
    - Overview: api-reference/index.md
  - Developer:
    - Overview: developer/index.md
    - Architecture: developer/architecture.md
    - State Management: developer/state-management.md
    - Block System: developer/block-system.md
    - Components: developer/components.md
    - Data Models: developer/data-models.md
    - Sync Layer: developer/sync-layer.md
    - Step-by-Step Tutorials: developer/tutorials.md
  - Contributing:
    - Guidelines: contributing/index.md

copyright: >
  Copyright &copy; 2025 Eclipse Tractus-X Contributors
